<style>
:root{
  --ink:#1A1A1C; --ink2:#141416; --surf:#27272B; --line:#3A3A40;
  --text:#E4E4E4; --white:#FFFFFF; --muted:#9A9A9A;
  --red:#C8161D; --red-band:#B0141A; --gold:#D2A957; --gold-soft:#E3C77F;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:"Noto Sans JP","Hiragino Kaku Gothic ProN",Meiryo,sans-serif;background:var(--ink);color:var(--text);line-height:1.85;font-size:16px}
img{max-width:100%;display:block}
a{color:var(--gold);text-decoration:none}
.wrap{max-width:900px;margin:0 auto;padding:0 20px}

/* header */
header{position:sticky;top:0;z-index:50;background:rgba(20,20,22,.94);backdrop-filter:blur(6px);border-bottom:1px solid var(--line)}
.nav{display:flex;align-items:center;justify-content:space-between;height:60px;gap:12px}
.brand{color:var(--white);font-weight:700;font-size:14px;letter-spacing:.05em;line-height:1.3}
.brand span{color:var(--gold);font-size:10.5px;display:block;letter-spacing:.18em}
.nav-right{display:flex;align-items:center;gap:14px}
.backlink{font-size:12.5px;color:var(--text);white-space:nowrap}
.backlink:hover{color:var(--gold)}
.langsw{display:flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;font-size:12.5px}
.langsw button{background:none;border:none;color:var(--muted);padding:6px 14px;cursor:pointer;font-family:inherit;font-size:12.5px}
.langsw button.on{background:var(--gold);color:var(--ink);font-weight:700}

/* title band */
.jt-hero{background:var(--ink2);border-bottom:1px solid var(--line);padding:56px 0 44px;text-align:center}
.jt-kicker{color:var(--gold-soft);letter-spacing:.28em;font-size:12.5px;margin-bottom:14px}
.jt-hero h1{color:var(--white);font-size:clamp(30px,6vw,46px);letter-spacing:.1em;font-weight:800;margin-bottom:10px}
.jt-sub{color:var(--gold);font-size:14px;letter-spacing:.06em;margin-bottom:22px}
.jt-lead{max-width:720px;margin:0 auto 10px;font-size:14.5px;color:#c9c9c9;text-align:left}
.jt-note{max-width:720px;margin:14px auto 0;font-size:12px;color:var(--muted);text-align:left;border:1px solid var(--line);border-radius:8px;padding:12px 16px;background:var(--surf)}
.jt-note b{color:var(--gold)}

/* pyramid */
.pyr{max-width:640px;margin:34px auto 0}
.pyr-title{font-size:12.5px;color:var(--muted);letter-spacing:.15em;margin-bottom:12px;text-align:center}
.pyr-row{margin:0 auto 6px;border:1px solid var(--line);border-radius:6px;background:var(--surf);padding:8px 10px;font-size:13px;color:var(--text);cursor:pointer;transition:.15s;line-height:1.5}
.pyr-row b{color:var(--gold);font-size:11px;letter-spacing:.12em;display:block}
.pyr-row:hover{border-color:var(--gold);transform:translateY(-1px)}
.pyr-r5{width:56%}.pyr-r4{width:67%}.pyr-r3{width:78%}.pyr-r2{width:89%}.pyr-r1{width:100%}
.pyr-cap{font-size:11.5px;color:var(--muted);text-align:center;margin-top:8px}

/* controls */
.controls{position:sticky;top:60px;z-index:40;background:rgba(26,26,28,.96);backdrop-filter:blur(6px);border-bottom:1px solid var(--line);padding:14px 0}
.searchrow{display:flex;gap:10px;align-items:center;margin-bottom:10px}
.searchrow input{flex:1;background:var(--surf);border:1px solid var(--line);border-radius:8px;color:var(--white);font-family:inherit;font-size:15px;padding:10px 14px;outline:none}
.searchrow input:focus{border-color:var(--gold)}
.searchrow input::placeholder{color:var(--muted)}
.hitcount{font-size:12px;color:var(--muted);white-space:nowrap}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{border:1px solid var(--line);border-radius:999px;padding:4px 13px;font-size:12px;color:var(--text);cursor:pointer;background:none;font-family:inherit;transition:.15s;line-height:1.7}
.chip:hover{border-color:var(--gold)}
.chip.on{border-color:var(--gold);color:var(--gold);background:rgba(210,169,87,.08)}
.chip .n{color:var(--muted);font-size:10.5px;margin-left:4px}

/* sections & entries */
.catsec{padding:40px 0 4px}
.catsec>.wrap>h2{color:var(--white);font-size:22px;border-left:4px solid var(--red);padding-left:12px;margin-bottom:6px;letter-spacing:.06em;text-align:left}
.catdesc{font-size:13px;color:var(--muted);margin-bottom:20px;padding-left:16px}
.ent{background:var(--surf);border:1px solid var(--line);border-radius:10px;padding:20px 22px;margin-bottom:14px;scroll-margin-top:170px}
.ent-head{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:2px}
.ent-head h3{color:var(--white);font-size:18.5px;letter-spacing:.04em;line-height:1.5}
.yomi{color:var(--muted);font-size:12px}
.xterm{color:var(--gold);font-size:12.5px;letter-spacing:.04em}
.def{font-size:14.5px;color:#d6d6d6;margin-top:8px}
.metaline{font-size:13px;color:#c9c9c9;margin-top:8px}
.metaline b{color:var(--gold);font-weight:600;font-size:12px;letter-spacing:.08em}
.src{font-size:11.5px;color:var(--muted);margin-top:10px}
.rel{font-size:12.5px;margin-top:6px}
.rel b{color:var(--muted);font-weight:400;font-size:11.5px;letter-spacing:.08em}
.rel a{margin-right:10px}
.ent.hl{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold)}
/* quotes */
.ent.qt h3{font-size:17.5px;color:var(--gold-soft);font-weight:700}
.ent.qt h3::before{content:"「";color:var(--gold)}
.ent.qt h3::after{content:"」";color:var(--gold)}
html[data-lang="en"] .ent.qt h3::before{content:"\201C"}
html[data-lang="en"] .ent.qt h3::after{content:"\201D"}
.who{font-size:12px;color:var(--muted)}

.noresult{padding:60px 20px;text-align:center;color:var(--muted);font-size:14px;display:none}

/* to top */
.totop{position:fixed;right:18px;bottom:18px;z-index:45;background:var(--surf);border:1px solid var(--line);color:var(--gold);border-radius:999px;width:44px;height:44px;font-size:18px;cursor:pointer;display:none}
.totop:hover{border-color:var(--gold)}

/* cta */
.jt-cta{background:linear-gradient(120deg,var(--red-band),#8f1015);text-align:center;padding:52px 20px;margin-top:56px}
.jt-cta h2{color:var(--white);font-size:clamp(20px,3.4vw,28px);margin-bottom:8px;letter-spacing:.06em}
.jt-cta p{color:#f4d9da;margin-bottom:24px;font-size:14px}
.btn{display:inline-block;background:var(--white);color:var(--red-band);font-weight:700;font-size:15.5px;padding:14px 34px;border-radius:6px;box-shadow:0 6px 22px rgba(0,0,0,.3);transition:.2s}
.btn:hover{transform:translateY(-2px)}

/* footer */
footer{padding:40px 20px 56px;text-align:center;border-top:1px solid var(--line);font-size:12.5px;color:var(--muted)}
footer .fbrand{color:var(--gold);letter-spacing:.15em;font-size:14px;margin-bottom:10px}
footer .links{margin:12px 0;display:flex;justify-content:center;gap:18px;flex-wrap:wrap}
footer .links a{color:#c9c9c9}

@media(max-width:640px){
  .nav{gap:8px}
  .brand{font-size:11px}
  .brand span{font-size:9px}
  .backlink{display:none}
  .langsw button{padding:6px 10px;font-size:12px}
  .ent{padding:16px 16px}
  .catsec>.wrap>h2{font-size:19px}
}
@media print{
  body{background:#fff;color:#111}
  header,.controls,.totop,.jt-cta,footer .links{display:none}
  .ent{background:#fff;border-color:#bbb;break-inside:avoid}
  .ent-head h3,.catsec>.wrap>h2{color:#111}
  .def{color:#222}
}
</style>
</head>

{id:"gravity",c:"l1",ja:{t:"重力",y:"じゅうりょく",d:"宇宙に働く四つの力（電磁力・弱い力・強い力・重力）のうち、人間が身体操作で使える唯一の宇宙の力。膝を抜けば、重力は誰にでも平等に始動エネルギーを与えてくれる。古伝沖縄空手の根源的なエネルギー源。",m:"ガリレオのピサの斜塔",s:"①p.66-71／p.147"},en:{t:"Gravity",d:"Of the four fundamental forces of the universe, gravity is the only one a human being can harness through body mechanics. Release the knees and gravity grants anyone, equally, the energy of initial motion. It is the primal power source of classical Okinawan karate.",m:"Galileo at the Leaning Tower of Pisa",s:"① pp.66-71, 147"},r:["free-fall","knee-release"]},
{id:"time",c:"l1",ja:{t:"時間",y:"じかん",d:"重力と並ぶ、もう一つの宇宙の法則。相手と共有する絶対時間を「相対的に2倍」にすることが、武道の足さばき・身体操作の目的である。",m:"相手の1分を、自分の2分にする",s:"①p.123-124"},en:{t:"Time",d:"The other universal law beside gravity. The purpose of budo footwork and body mechanics is to make the absolute time shared with the opponent relatively double for oneself.",m:"Turning the opponent's one minute into your two",s:"① pp.123-124"},r:["time-creation","setsuna"]},
{id:"fma",c:"l1",ja:{t:"F=MA",y:"エフ・イコール・エムエー",d:"力＝質量×加速度。無想会の技は、質量（体重や筋量）ではなく加速度を極大化して威力を作る。前腕を鞭のように使う身体操作がその方法である。",m:"カウボーイの鞭／ロケット",s:"①p.18-23"},en:{t:"F = MA",d:"Force equals mass times acceleration. Muso-kai technique builds power not from mass (body weight or muscle bulk) but by maximizing acceleration—achieved by using the forearm like a whip.",m:"A cowboy's whip; a rocket",s:"① pp.18-23"},r:["whip-body","kinetic"]},
{id:"kinetic",c:"l1",ja:{t:"運動エネルギー K=1/2MV²",y:"うんどうエネルギー",d:"運動エネルギーは質量に比例し、速度の二乗に比例する。同じ体重でも速度が2倍なら威力は4倍――「速くて重い突き」の物理的根拠。威力の順位は「速く重い＞遅く重い＞速く軽い＞遅く軽い」。",s:"④p.20-24"},en:{t:"Kinetic Energy: K = ½MV²",d:"Kinetic energy is proportional to mass and to the square of velocity: at the same body weight, double the speed means four times the power—the physics behind the 'fast and heavy punch'. The ranking of power: fast-heavy > slow-heavy > fast-light > slow-light.",s:"④ pp.20-24"},r:["hayasa","latissimus"]},
{id:"mech-energy",c:"l1",ja:{t:"力学的エネルギーの公式",y:"りきがくてきエネルギー",d:"「位置エネルギー＋運動エネルギー＝力学的エネルギー」――これが空手の打撃力の正体。二種のエネルギーは相互否定の関係にあるため身体の別々の部分で分けて創出し、マト（標的）の一点で統合する。",m:"四人のリレー走者が同時にゴールインする（持つバトンの種類が違う）",s:"④p.150-151"},en:{t:"The Mechanical Energy Formula",d:"Potential energy + kinetic energy = mechanical energy—this is the true identity of karate's striking power. Because the two energies are mutually exclusive, they are created separately in different parts of the body and unified at the single point of the target.",m:"Four relay runners crossing the finish line at the same moment, each carrying a different baton",s:"④ pp.150-151"},r:["parallel-creation","potential-field"]},
{id:"energy-3stages",c:"l1",ja:{t:"エネルギー利用の三段階",y:"さんだんかい",d:"エネルギー保存則を武術に読み替えた発展段階論。第一段階＝自分でエネルギーを出す。第二段階＝相手の動きも使う。第三段階＝宇宙から与えられたエネルギーを使わせてもらう（＝借力）。",s:"①p.46-48／p.122"},en:{t:"The Three Stages of Energy Use",d:"The law of conservation of energy read as a path of martial development. Stage one: generate energy yourself. Stage two: use the opponent's motion as well. Stage three: borrow the energy granted by the universe itself (shakuriki).",s:"① pp.46-48, 122"},r:["shakuriki"]},
{id:"free-fall",c:"l1",ja:{t:"自然落下",y:"しぜんらっか",d:"「歩く」の正体。膝の力を抜けば重力が始動エネルギーを与えてくれるため、技の初動が消える（相手に見えない）。走りではなく落下こそが武道の移動原理。",m:"壁の実験（壁を背にすると歩き出せない）",s:"①p.66-71"},en:{t:"Free Fall",d:"The true identity of 'walking'. Release the knees and gravity supplies the energy of initial motion, so the start of the technique vanishes from the opponent's sight. Falling—not running—is the locomotive principle of budo.",m:"The wall experiment: stand with your back against a wall and you cannot step forward",s:"① pp.66-71"},r:["knee-release","walking"]},
{id:"potential-field",c:"l1",ja:{t:"位置エネルギー＝場の創出",y:"ばのそうしゅつ",d:"位置エネルギーとは「場」を創出するエネルギーである。発動しなくても、持っているだけで場を支配する。無の場＝0＋0＝0であり、相手には何も見えない。",m:"ピサの斜塔の上の小石――落ちなくても、塔の下に「危険な場」を作っている",s:"③p.14-20／p.121-123／p.138-139"},en:{t:"Potential Energy Creates the Field",d:"Potential energy is the energy that creates a 'field'. Even unreleased, its mere possession dominates the space. The field of mu (nothingness) is 0 + 0 = 0—the opponent sees nothing at all.",m:"A pebble atop the Leaning Tower of Pisa: without falling, it already creates a field of danger below",s:"③ pp.14-20, 121-123, 138-139"},r:["box-creation","mu-thought","mech-energy"]},
{id:"zero-thought",c:"l1",ja:{t:"ゼロの思想",y:"ゼロのしそう",d:"ゼロがあるからこそ、プラスとマイナスが定義できる（海抜0mがなければ山の高さすら測れない）。正中線の発見はバラモンのゼロの発見に匹敵する身体文化上の大発見であり、西洋身体文化は「ゼロ以前の数学」だと新垣は指摘する。",m:"「では、海面そのものは何メートル？」",s:"③p.118-121"},en:{t:"The Philosophy of Zero",d:"Only with zero can plus and minus be defined—without sea level, even the height of a mountain cannot be measured. Arakaki argues that the discovery of the centerline rivals the Brahmin discovery of zero, and that Western body culture remains 'mathematics before zero'.",m:"'Then how many meters high is the sea itself?'",s:"③ pp.118-121"},r:["centerline","centerline-zero"]},
{id:"same-place",c:"l1",ja:{t:"同時同所不可の法則",y:"どうじどうしょふか",d:"「二つの物体が、同じ場所を同じ時間（同時）に共有することはできない」――武道の心身思想の基本にある物理法則。合撃（ガッシ）の原理を支える。",m:"同じ道路を左右から走ってくる車は必ず衝突する",s:"④p.118-119"},en:{t:"The Law of Exclusive Occupation",d:"Two objects cannot share the same place at the same time—a physical law underlying the mind-body thought of budo, and the principle behind gasshi (the meeting strike).",m:"Two cars driving toward each other in the same lane must collide",s:"④ pp.118-119"},r:["gasshi"]},
{id:"hayasa",c:"l1",ja:{t:"速さと早さ",y:"はやさとはやさ",d:"速さ＝Velocity（物理的速度＝実）、早さ＝Agility・Quickness（相対的な早さ＝虚に通じる）。「はやさ」でまず速さが問われるのは、それが「実」だから。早さのみを修行すると、虚実の使い手で終わる。",s:"④p.18-24／p.103"},en:{t:"Hayasa: Speed vs. Quickness",d:"Speed (velocity) is physical and belongs to jitsu, the real; quickness (agility) is relative and borders on kyo, the illusory. Speed is questioned first because it is 'real'—train only quickness and you end as a mere manipulator of feints.",s:"④ pp.18-24, 103"},r:["jitsu-only","distance-short","kinetic"]},
/* ---- Layer 2: Body Mechanics (1/2) ---- */
{id:"shurite-tsuki",c:"l2",ja:{t:"首里手の突き",y:"しゅりてのつき",d:"腰を振らない・回さない。腕を震わせない。円運動はしない。鞭のように使うのは肘から先（前腕）のみで、脚は決して締めず「張る」だけ、上体も位置エネルギーを活用するために「張る」。身体を張って重力落下を活用し、突き手側の腸骨筋のみを正中線に激突させて速さを生み、当たる瞬間にのみ上体のクシ（腰と後ろ）と手の内を締めてチンクチを掛ける。なお腕の軌道は螺旋を描く（→螺旋の腕）。",s:"①②③④全巻（技術体系の総論）"},en:{t:"The Shuri-te Punch",d:"No hip swing, no hip rotation, no shaking of the arm, no circular motion. Only the forearm is used like a whip; the legs are never clenched but kept 'taut', and the torso is likewise held taut to harness potential energy. The body falls with gravity while only the punching-side iliacus slams into the centerline to generate speed—and only at the instant of impact are the kushi (hips and back) and the grip tightened to apply chinkuchi. The arm's trajectory, meanwhile, traces a spiral.",s:"Vols. ①-④ (overview of the technical system)"},r:["whip-body","chinkuchi","kushi","iliacus","spiral-arm","nahate-tsuki"]},
{id:"nahate-tsuki",c:"l2",ja:{t:"那覇手の突き",y:"なはてのつき",d:"下腿も上体も、すべてを締めて突きを出す方式。チンクチ（筋肉の収縮で出す力）とV字の杭（腰を割る）を軸とする。首里手（鞭＋エアーポケット）と混ぜると「似て非なるもの」になる、と新垣は警告する。",s:"①p.29-32／p.110-112"},en:{t:"The Naha-te Punch",d:"The method of punching with everything clenched—lower legs and torso alike—built on chinkuchi (power from muscular contraction) and the V-shaped stake of the split hips. Mixing it with Shuri-te (whip + air pocket) produces something that 'looks alike but is not', Arakaki warns.",s:"① pp.29-32, 110-112"},r:["chinkuchi","koshi-waru","shurite-tsuki"]},
{id:"kushi",c:"l2",ja:{t:"クシ（腰・後）",y:"くし",d:"沖縄語で「腰」も「後ろ（背中）」もどちらも「クシ」と呼ぶ。口伝「力はクシから」の通り、突き・歩き・蹴りのエネルギーはすべて腰（大腰筋・腸骨筋・腰方形筋）と後ろ（広背筋）で創出し、四肢は道具として伝えるのみ。「腕で突かない、足で歩かない、脚で蹴らない」。",s:"④p.35／⑤p.189"},en:{t:"Kushi (Hips and Back)",d:"In Okinawan, both the hips and the back are called kushi. As the oral teaching says, 'power comes from the kushi': all energy for punching, walking, and kicking is created in the hips (psoas, iliacus, quadratus lumborum) and the back (latissimus dorsi), while the limbs merely deliver it as tools. 'Do not punch with the arm, walk with the feet, or kick with the leg.'",s:"④ p.35; ⑤ p.189"},r:["latissimus","psoas","quadratus","teuchi"]},
{id:"knee-release",c:"l2",ja:{t:"膝を抜く",y:"ひざをぬく",d:"膝関節にかかわる筋肉を脱力し、重力に引かれて身体が落ちる状態を意識的に作ること。技の「起こり」が消え、初動が相手に見えなくなる。古伝沖縄空手の技術体系の入口。",m:"お猪口の皆伝テスト――膝裏に置いた酒をこぼさずに前後を斬る",s:"①p.79-82／p.133-134"},en:{t:"Releasing the Knees",d:"Consciously relaxing the muscles around the knee joint so that the body drops, pulled by gravity. The 'telegraph' of the technique disappears—the opponent cannot see the initial motion. The gateway to the entire classical system.",m:"The master's sake-cup test: cut forward and backward without spilling a cup balanced behind the knee",s:"① pp.79-82, 133-134"},r:["free-fall","walking","okori"]},
{id:"walking",c:"l2",ja:{t:"歩く",y:"あるく",d:"仮想の重心への自然落下。「武道は走ってはならない、歩け」。走りは畜生道であり、頭が上下せず初動が見えない「歩き」こそが武道の移動である。④では「歩くことが技」とまで言い切られる。",m:"壁の実験（壁を背にすると歩けない）",s:"①p.66-71／④p.117"},en:{t:"Walking",d:"Free fall toward the virtual center of gravity. 'Budo must not run—walk.' Running is the way of beasts; walking, with no bobbing of the head and no visible start, is budo locomotion. Vol. ④ goes as far as to declare that 'walking itself is the technique'.",m:"The wall experiment: with a wall at your back, you cannot walk",s:"① pp.66-71; ④ p.117"},r:["free-fall","virtual-center","four-walks","shukuchiho"]},
{id:"whip-body",c:"l2",ja:{t:"鞭の身体",y:"むちのからだ",d:"脱力した前腕（肘から先）を鞭のようにしならせ、F=MAの加速度を作る首里手の中核操作。鞭になるのは肘から先のみであり、体幹は張って支える――「全身が鞭」なのではない。",m:"カウボーイの鞭／身体は木・腕は鞭／拳はロケット",s:"①p.17-23"},en:{t:"The Whip Body",d:"The core Shuri-te operation: letting the relaxed forearm—from the elbow down only—snap like a whip to create F=MA acceleration. The trunk stays taut as the whip's handle; the whole body is not the whip.",m:"A cowboy's whip: the body is the tree, the arm the whip, the fist the rocket",s:"① pp.17-23"},r:["fma","shurite-tsuki","spiral-arm"]},
{id:"muchimi",c:"l2",ja:{t:"ムチミ（餅身）",y:"むちみ",d:"餅のように粘る身体操作。本来の表記は「餅身」であり、「鞭身」は本土での誤用と新垣は明記する（→歴史「ムチミの語源」）。屈筋の適度な使い方の全身への応用であり、掛けすぎれば居着いて「花手（ハナディー）」になる。「ムチミの無い空手は、沖縄の空手ではない」。",m:"餅の粘り",s:"④p.50-52／②p.118-123"},en:{t:"Muchimi (the Mochi Body)",d:"A body quality as sticky and clinging as mochi rice cake. The original writing is 'mochi-body'; 'whip-body' is a mainland misreading, Arakaki states (see History: 'The Etymology of Muchimi'). It is the whole-body application of moderate flexor use—overdone, it roots you and degenerates into hanadi, 'flower hands'. 'Karate without muchimi is not Okinawan karate.'",m:"The stickiness of mochi",s:"④ pp.50-52; ② pp.118-123"},r:["muchimi-etymology","gamaku","chinkuchi"]},
{id:"gamaku",c:"l2",ja:{t:"ガマク",y:"がまく",d:"仙骨と肋骨最下部を結ぶ筋群。当たる刹那に急激に絞ることで、貫く重さと反動に耐える強さを生む。②では「水を満たした風船」（鉄球でない理由は、分割できるから）と深化し、③で解剖学的正体が腰方形筋と特定された。",m:"乾いたタオルの両端で絞る、水の風船",s:"①p.24-27／②p.28-29／③p.88-96"},en:{t:"Gamaku",d:"The muscle group linking the sacrum and the lowest ribs. Wrung sharply at the instant of impact, it produces penetrating weight and the strength to absorb recoil. Vol. ② deepens the image to 'a water-filled balloon' (not an iron ball—because it can be divided), and Vol. ③ identifies its anatomical reality as the quadratus lumborum.",m:"A water balloon wrung in a dry towel",s:"① pp.24-27; ② pp.28-29; ③ pp.88-96"},r:["quadratus","chinkuchi","gamaku-etymology"]},
{id:"chinkuchi",c:"l2",ja:{t:"チンクチ（一寸力）",y:"ちんくち",d:"筋肉の収縮で出す力。那覇手の突きの主機構（寸勁に相当）だが、那覇手専用ではなく、首里手でも当たる瞬間にのみ上体のクシと手の内を締めて掛ける。②では「屈筋の適度な使い方」と身体生理学的に定義。掛けすぎは居着く。",m:"鍛錬法：肘を固定した打ち下ろし",s:"①p.29-32／②p.119"},en:{t:"Chinkuchi (One-Sun Power)",d:"Power generated by muscular contraction—the main engine of the Naha-te punch (comparable to the one-inch punch), yet not exclusive to Naha-te: in Shuri-te it is applied only at the instant of impact by tightening the kushi and the grip. Vol. ② defines it physiologically as 'the moderate use of the flexors'. Overuse roots the body.",m:"Training drill: downward strikes with the elbow fixed",s:"① pp.29-32; ② p.119"},r:["gamaku","muchimi","chinkuchi-etymology","sujinuki"]},
{id:"sujinuki",c:"l2",ja:{t:"筋を抜く",y:"すじをぬく",d:"チンクチを養う鍛錬法。ナイファンチ立ちで肘を固定し、全速の打ち下ろしを毎日100〜500回行う。",m:"180度の壁",s:"①p.27-28"},en:{t:"Sujinuki (Tendon Release Drill)",d:"The drill that forges chinkuchi: in Naihanchi stance, elbow fixed, perform 100–500 full-speed downward strikes daily.",m:"The 180-degree wall",s:"① pp.27-28"},r:["chinkuchi","naihanchi"]},
{id:"shakutorimushi",c:"l2",ja:{t:"尺取虫",y:"しゃくとりむし",d:"胸→腰→足へ、外から見えない筋連動で重心（仙骨）を運ぶ操作。180度の回転すら体内の直線運動で行う。新垣はこれを「日本武道の奥義」と呼ぶ。",m:"尺取虫。「理解できなければ実物を見よ」",s:"①p.130-132"},en:{t:"The Inchworm",d:"Carrying the center of gravity (the sacrum) from chest to hips to feet through muscle linkage invisible from outside—even a 180-degree turn is performed as a straight line inside the body. Arakaki calls this 'the inner secret of Japanese budo'.",m:"An inchworm—'if you cannot understand it, go watch the real thing'",s:"① pp.130-132"},r:["walk-inside","kushi"]},
{id:"airpocket",c:"l2",ja:{t:"エアーポケット",y:"えあーぽけっと",d:"張った胸と突き出した尻の間の空間に仮想の重心を置くことで、身体が「浮く」首里手の方式。那覇手の「腰を割る」と対をなす。",m:"スキージャンプ／空間から糸が両足につながる",s:"①p.101-103"},en:{t:"The Air Pocket",d:"The Shuri-te method of 'floating': placing the virtual center of gravity in the space between the expanded chest and the extended hips. The counterpart of Naha-te's split hips.",m:"A ski jumper; threads running from empty space to both feet",s:"① pp.101-103"},r:["uku","virtual-center","koshi-waru"]},
{id:"koshi-waru",c:"l2",ja:{t:"腰を割る（V字の杭）",y:"こしをわる",d:"骨盤のV字の先端を地面に突き刺すように使い、左右の足を浮かせる那覇手（四股立ち）の方式。首里手のエアーポケットと対をなす。",m:"メリーゴーラウンドの馬（鉄棒で浮いている）",s:"①p.110-112"},en:{t:"Splitting the Hips (the V-Stake)",d:"The Naha-te method (as in shiko-dachi): driving the V-point of the pelvis into the ground like a stake so that both feet float. The counterpart of Shuri-te's air pocket.",m:"A merry-go-round horse, floating on its pole",s:"① pp.110-112"},r:["airpocket","nahate-tsuki"]},
{id:"uku",c:"l2",ja:{t:"浮く",y:"うく",d:"足に体重を乗せない状態。「飛ぶな、浮くのだ」。形の最初の直立からすでに浮いていなければならない。その場でジャンプできるかどうかが試験になる。",m:"飯篠長威斎の熊笹／北の湖の四股",s:"①p.113-114"},en:{t:"Floating",d:"The state in which no body weight rests on the feet. 'Do not jump—float.' One must already be floating from the first upright posture of the kata; whether you can jump on the spot is the test.",m:"Iizasa Choisai seated on bamboo grass without crushing it; Kitanoumi's shiko",s:"① pp.113-114"},r:["airpocket","tachikata-nai"]},
{id:"nekoashi",c:"l2",ja:{t:"猫足立ちの正体",y:"ねこあしだち",d:"カカトの上下＝膝の抜きの発生装置。着地の動作だけで自然落下を作り出す。「立ち方」ではなく落下の発生装置である。",m:"自然落下発生装置",s:"①p.74-77"},en:{t:"The True Cat Stance",d:"The heel's rise and fall is a generator of knee release: the mere act of landing creates free fall. It is not a 'stance' but a free-fall generator.",m:"A free-fall generator",s:"① pp.74-77"},r:["knee-release","tachikata-nai"]},
{id:"tachikata-nai",c:"l2",ja:{t:"立ち方は無い",y:"たちかたはない",d:"「◯◯立ち」は流動する動きのストップモーションにすぎない。掛け足立ちも結び立ちも運足の一瞬であり、止まった「立ち方」を作った瞬間に技は死ぬ。④では、立ち方の名称の多さは本土移入時の指導者不足の産物と説明される。",m:"ストップモーション",s:"①p.72-78／④p.176-177"},en:{t:"There Are No Stances",d:"Every named 'stance' is merely a stop-motion frame of flowing movement. Cross-leg and heel-together stances are instants of stepping; freeze them into 'stances' and the technique dies. Vol. ④ explains the proliferation of stance names as a product of the teacher shortage when karate moved to mainland Japan.",m:"A stop-motion frame",s:"① pp.72-78; ④ pp.176-177"},r:["nekoashi","naihanchi-dachi"]},
{id:"four-walks",c:"l2",ja:{t:"4種類の歩行",y:"よんしゅるいのほこう",d:"動歩行（倒れ込み）・静歩行（倒れずに運ぶ）に、それぞれの「見せかけ」を加えた最低4種類の歩行を使い分ける。幼児の歩きは動歩行、成人の歩きは静歩行である。",s:"②p.16-21"},en:{t:"The Four Kinds of Walking",d:"Dynamic walking (falling forward), static walking (carrying without falling), and a feigned version of each—at least four kinds of gait to be used at will. An infant walks dynamically; an adult, statically.",s:"② pp.16-21"},r:["walking","hist-dynamic-walk"]},
{id:"virtual-foot",c:"l2",ja:{t:"仮想の足",y:"かそうのあし",d:"空間に意識で作る足。新垣による天才の定義とは「空間を歩ける（仮想の足で歩ける）人間」である。",s:"②p.22-23"},en:{t:"The Virtual Foot",d:"A foot created in empty space by intention. Arakaki's definition of genius: one who can walk on air—on virtual feet.",s:"② pp.22-23"},r:["virtual-center","walking"]},
{id:"antigravity-muscles",c:"l2",ja:{t:"抗重力筋",y:"こうじゅうりょくきん",d:"腹筋・背筋・大中臀筋・大腿四頭筋・下腿三頭筋。これこそが「体軸」の正体であり、体軸は線ではなく筋肉である。倒れ込む身体を支え、その支えがエネルギーを生む。",s:"②p.24-26"},en:{t:"The Anti-Gravity Muscles",d:"Abdominals, spinal erectors, gluteals, quadriceps, triceps surae: these are the true identity of the 'body axis'—the axis is muscle, not a line. They support the falling body, and that support generates energy.",s:"② pp.24-26"},r:["tochiho","hamstring"]},
{id:"walk-inside",c:"l2",ja:{t:"身体内で歩く",y:"しんたいないであるく",d:"開放した股関節の間を、ガマクを掛けた重心が移動すること。新垣による達人の定義とは「身体内で歩ける人間」。上級者の形が「コントロールされた右往左往」に見える理由である。",s:"②p.27-32"},en:{t:"Walking Inside the Body",d:"The center of gravity, held by gamaku, travels between the opened hip joints. Arakaki's definition of a master: one who can walk inside his own body. This is why an adept's kata looks like 'controlled wandering'.",s:"② pp.27-32"},r:["gamaku","shakutorimushi","walking"]},
/* ---- Layer 2: Body Mechanics (2/2) ---- */
{id:"tochiho",c:"l2",ja:{t:"倒地法（倒木法）",y:"とうちほう",d:"朽ち木のように、姿勢を変化させずに倒れ込みながら技を出す方法。首里手はすべての技に適用し、②の第五・六章では蹴りにも全面展開される。",m:"朽ち木の倒れ／剣の切り下ろし",s:"②p.37-38／p.108-112"},en:{t:"Tochiho (the Falling-Tree Method)",d:"Delivering techniques while falling like a dead tree—without changing posture. Shuri-te applies it to every technique; Vol. ② extends it fully to kicks.",m:"A rotting tree toppling; a sword's downward cut",s:"② pp.37-38, 108-112"},r:["free-fall","hamstring","hakoBody"]},
{id:"hakoBody",c:"l2",ja:{t:"箱型に使う／胸で歩く",y:"はこがたにつかう",d:"頭から足先までを一つの長方形（箱）として、同時に仮想重心へ到着させる操作。箱の頂点は胸（頭は割れない球）。胸で前に倒れることが「歩く」であり、立ち姿自体がタメ（ダム）になる。",m:"「武術はドン！だけの勝負」",s:"②p.39-43"},en:{t:"The Box Body / Walking with the Chest",d:"Treating the body from head to toe as one rectangle—a box—that arrives at the virtual center all at once. The apex of the box is the chest (the head is an unsplittable sphere). Falling forward with the chest is 'walking'; the standing posture itself is the dam of stored energy.",m:"'A martial encounter is decided by the single DON!'",s:"② pp.39-43"},r:["tochiho","sori","virtual-center"]},
{id:"spiral-arm",c:"l2",ja:{t:"螺旋の腕",y:"らせんのうで",d:"首里手の突きにおいて、前腕・手首・指の軌道はスナップの連続として螺旋を描く（肘は正中線上を直線に進む）。拳は握り込まず「指を折り畳む」（親指と小指の谷を合わせる）。螺旋を描くのは腕の軌道であって、全身や腰の螺旋ではない。",m:"カウボーイの鞭の手首",s:"②p.64-73"},en:{t:"The Spiral Arm",d:"In the Shuri-te punch, the forearm, wrist, and fingers trace a spiral of successive snaps while the elbow travels straight along the centerline. The fist is not clenched but 'folded'—the valleys of thumb and little finger brought together. The spiral belongs to the arm's trajectory, never to the hips or the whole body.",m:"The wrist of a cowboy cracking his whip",s:"② pp.64-73"},r:["whip-body","shurite-tsuki"]},
{id:"hamstring",c:"l2",ja:{t:"ハムストリング（蹴りの主働筋）",y:"はむすとりんぐ",d:"蹴り足の主働筋は大腿二頭筋・半腱様筋・半膜様筋（ハムストリング）であり、抗重力筋は支え足で働く。膝の筋抜きは禁止――関節は筋肉で守る。",m:"柱と懸垂の実験（引く力で身体が動く）",s:"②p.110-114／p.120-121"},en:{t:"The Hamstrings: Prime Movers of the Kick",d:"The kicking leg is driven by the hamstrings (biceps femoris, semitendinosus, semimembranosus), while the anti-gravity muscles work in the supporting leg. Never release the muscles of the knee—joints are protected by muscle.",m:"The pillar pull-up experiment: pulling force moves the body",s:"② pp.110-114, 120-121"},r:["antigravity-muscles","tochiho"]},
{id:"psoas",c:"l2",ja:{t:"大腰筋",y:"だいようきん",d:"「腰＝人体の要」の解剖学的正体その一。背骨と大腿骨を体内で直結する深層筋であり、大腰筋1ミリの操作が足先1メートルの移動になる。最先端の短距離走法と沖縄古伝（前屈立ちで走る）の一致を新垣は指摘する。",m:"ヒラメ筋（ブレーキ）との対比",s:"③p.29-31／p.100-102／p.126-129"},en:{t:"The Psoas Major",d:"First anatomical identity of the koshi, the body's linchpin: a deep muscle directly connecting spine to femur inside the body. One millimeter of psoas operation becomes one meter of foot travel. Arakaki notes that cutting-edge sprint theory and old Okinawan practice (running in a forward stance) agree here.",m:"Contrast with the soleus, the brake muscle",s:"③ pp.29-31, 100-102, 126-129"},r:["kushi","iliacus","quadratus"]},
{id:"iliacus",c:"l2",ja:{t:"腸骨筋",y:"ちょうこつきん",d:"腰の解剖学的正体その二。骨盤の内面から大腿骨へ走る深層筋で、大腰筋とともに腸腰筋を構成し、首里手の突きでは突き手側の腸骨筋のみを正中線に激突させて「腰の激突」のエネルギー源となる。",m:"ジグザグ（くの字）を描く",s:"③p.46-53"},en:{t:"The Iliacus",d:"Second anatomical identity of the koshi: a deep muscle running from the inner pelvis to the femur, forming the iliopsoas together with the psoas. In the Shuri-te punch, only the punching-side iliacus slams into the centerline—the energy source of the 'hip collision'.",m:"Tracing a zigzag, the character く",s:"③ pp.46-53"},r:["psoas","shurite-tsuki","koshi-mawase-error"]},
{id:"quadratus",c:"l2",ja:{t:"腰方形筋（ガマクの正体）",y:"ようほうけいきん",d:"肋骨最下部と骨盤を結ぶ深層筋。③における「ガマクとは腰方形筋のことである」という特定は、シリーズの核心的解明のひとつ。掛け外しによって体幹内で倒地法を行い、技のエネルギーを体幹から手足へ最短距離で放出する。",m:"ハカリ／南蛮胴（胴体を一枚の鎧として使う）",s:"③p.88-96"},en:{t:"The Quadratus Lumborum: Gamaku Identified",d:"A deep muscle joining the lowest ribs to the pelvis. Vol. ③'s identification—'gamaku is the quadratus lumborum'—is one of the series' central discoveries. Engaged and released, it performs the falling-tree method inside the trunk, discharging energy from torso to limbs by the shortest path.",m:"A balance scale; a namban cuirass—the torso worn as a single plate of armor",s:"③ pp.88-96"},r:["gamaku","kushi","gamaku-etymology"]},
{id:"dont-kick-ground",c:"l2",ja:{t:"地面を蹴るな",y:"じめんをけるな",d:"走り・蹴り・突きの始動で地面を蹴ると、エネルギーが下へ逃げ、動作が相手に読まれる。始動は腰（体幹）から。「最速の蹴りとは、蹴らずに出す蹴り」である。",s:"③p.31-38"},en:{t:"Do Not Kick the Ground",d:"Kick off the ground to start a run, kick, or punch and the energy escapes downward while the motion telegraphs itself. Initiation comes from the koshi, the trunk. 'The fastest kick is the kick delivered without kicking off.'",s:"③ pp.31-38"},r:["kushi","okori"]},
{id:"hakamagoshi",c:"l2",ja:{t:"袴腰",y:"はかまごし",d:"武士の袴が保存した、腰の正しい角度と形状。立ち方の根源であり、腰を反らせず立てず、「袴の後ろ姿」の腰が正しい。",m:"武士の後ろ姿",s:"③p.73-83"},en:{t:"Hakama-goshi (the Hakama Hips)",d:"The correct angle and shape of the hips, preserved in the samurai's hakama. The root of all standing: hips neither arched nor tucked—the hips of 'a samurai seen from behind'.",m:"A samurai viewed from behind",s:"③ pp.73-83"},r:["kushi","naihanchi-dachi"]},
{id:"dont-drag-foot",c:"l2",ja:{t:"足を引きつけるな",y:"あしをひきつけるな",d:"移動で後ろ足を引きつけると、その瞬間が「居着き」になる。足は引きつけず、腰で運ぶ。",s:"③p.104-107"},en:{t:"Do Not Draw Up the Rear Foot",d:"Draw the rear foot up as you move and that instant becomes itsuki—rootedness. Do not pull the foot in; carry it with the koshi.",s:"③ pp.104-107"},r:["itsuki","kushi"]},
{id:"constant-speed",c:"l2",ja:{t:"等速と加速",y:"とうそくとかそく",d:"達人の動きは等速である。加速の気配が無いから予兆が読めない。「闇夜に霜が降りる」ような無音の等速移動こそ理想であり、無拍子とは「アレヨ！アレヨ！」という間に入られることである。",m:"雑賀党の夜襲の形容",s:"③p.102-104"},en:{t:"Constant Speed vs. Acceleration",d:"A master moves at constant speed: with no scent of acceleration, there is no omen to read. The ideal is a soundless, even glide 'like frost falling on a dark night'; no-rhythm means the opponent is entered upon while still gasping.",m:"How the Saika mercenaries' night raids were described",s:"③ pp.102-104"},r:["muhyoshi","yamiyo"]},
{id:"sori",c:"l2",ja:{t:"タメではなくソリ",y:"ためではなくそり",d:"見た目の「タメ」の正体は、S字の背骨の「反り」である。背骨にとっては反りこそが一直線であり、達人は「胸で歩く」（前方ガマク）。",s:"③p.126-130"},en:{t:"Not Coiling but Arching",d:"What looks like a 'coil' is in truth the arch of the S-shaped spine—for the spine, the arch is its straight line. The master 'walks with the chest' (forward gamaku).",s:"③ pp.126-130"},r:["hakoBody","gamaku"]},
{id:"seishan-pressure",c:"l2",ja:{t:"セイシャンの腹圧",y:"せいしゃんのふくあつ",d:"セイシャンは前方ガマクの実戦形であり、腹圧は圧縮して噴射するジェットエンジンにたとえられる。首里手に丹田の強調は無い――腰（クシ）＝後（クシ）である。",s:"③p.107-112"},en:{t:"Abdominal Pressure in Seisan",d:"Seisan is the combat kata of forward gamaku; its abdominal pressure works like a jet engine—compress, then blast. Shuri-te has no emphasis on the tanden: the hips and the back are both kushi.",s:"③ pp.107-112"},r:["gamaku","kushi"]},
{id:"teuchi",c:"l2",ja:{t:"手打ちの突き",y:"てうちのつき",d:"「手と腕は手打ち。しかし突きは手打ちではない」――腕は道具（第三層）であり、突きのエネルギーは腕では作らない。すべてはクシ（腰・後）で操作する。",m:"古伝の突き≠「足で蹴り、腰を回し、腕で突き出す」",s:"④p.17-20／p.143"},en:{t:"The 'Arm-Only' Punch Paradox",d:"'The hand and arm merely hand-strike—yet the punch is no arm-punch.' The arm is a tool (the third layer); the punch's energy is never made in the arm. Everything is operated from the kushi.",m:"The classical punch is NOT 'kick the ground, twist the hips, thrust the arm'",s:"④ pp.17-20, 143"},r:["kushi","three-layers","latissimus"]},
{id:"three-layers",c:"l2",ja:{t:"筋肉三層モデル",y:"きんにくさんそうもでる",d:"第一層＝腰の最深層（大・小腰筋、腸骨筋、腰方形筋）、第二層＝胸・背中（広背筋、大胸筋、前鋸筋）、第三層＝四肢＝道具。エネルギーは深層から創出し、道具で伝える。",s:"④p.24-28"},en:{t:"The Three-Layer Muscle Model",d:"Layer one: the deepest muscles of the koshi (psoas major and minor, iliacus, quadratus lumborum). Layer two: chest and back (latissimus, pectoralis, serratus). Layer three: the limbs—tools. Energy is created in the depths and delivered by the tools.",s:"④ pp.24-28"},r:["kushi","latissimus","teuchi"]},
{id:"latissimus",c:"l2",ja:{t:"広背筋＝突きの主働筋",y:"こうはいきん",d:"突きの正体は、広背筋が肘を正中線まで引き付ける「引く」操作である。押すのではなく引くことで技を出し、斜め下方向への収縮は重力に加勢する。「25倍の法則」＝広背筋1cmの収縮が突き25cmの移動になる。",s:"④p.35-52"},en:{t:"The Latissimus Dorsi: Prime Mover of the Punch",d:"The punch is, in truth, a pulling operation: the latissimus dorsi draws the elbow to the centerline. Technique comes from pulling, not pushing, and the muscle's downward-diagonal contraction allies itself with gravity. The 'Law of 25': one centimeter of latissimus contraction becomes twenty-five centimeters of punch travel.",s:"④ pp.35-52"},r:["kushi","waki-shime","three-weights","teuchi"]},
{id:"waki-shime",c:"l2",ja:{t:"脇の締め",y:"わきのしめ",d:"前鋸筋と広背筋脇下部の急激な収縮。「脇を締めろ」という教えの解剖学的正体である。",s:"④p.44-46"},en:{t:"Tightening the Armpit",d:"A sharp contraction of the serratus anterior and the lower latissimus—the anatomical reality behind the old instruction 'tighten your armpits'.",s:"④ pp.44-46"},r:["latissimus"]},
{id:"three-weights",c:"l2",ja:{t:"三つの重さ",y:"みっつのおもさ",d:"突きに乗る重さは、①腕の重さ ②広背筋の重さ ③体重の三つ。鉄棒の端に錘を載せれば「軽く持てて、重く当たる」。",m:"鉄棒と錘の図",s:"④p.46-50"},en:{t:"The Three Weights",d:"Three weights ride on the punch: the arm's, the latissimus's, and the body's. Load a weight on the end of an iron bar and it 'carries light but lands heavy'.",m:"The iron bar and weight diagram",s:"④ pp.46-50"},r:["latissimus"]},
{id:"sacroiliac",c:"l2",ja:{t:"仙腸関節",y:"せんちょうかんせつ",d:"人体唯一の不動関節。仙骨と腸骨を靭帯で強固に結合し、体幹のエネルギーを漏らさず伝える構造的な要である。",s:"④p.53-60"},en:{t:"The Sacroiliac Joint",d:"The body's only immovable joint: sacrum and ilium bound fast by ligament—the structural keystone that transmits the trunk's energy without leakage.",s:"④ pp.53-60"},r:["kushi","quadratus"]},
{id:"asobi",c:"l2",ja:{t:"あそびを消す",y:"あそびをけす",d:"あそび＝筋肉の道草（目的に直接関与しない操作）。悪癖とは「宇宙法則を否定しきれなかった澱（オリ）」である。リレーで走っていない三人こそが、あそびの正体。",m:"コンビニへ行く途中で友達の家に寄る",s:"④p.88-96／p.136-137"},en:{t:"Erasing Asobi (Slack)",d:"Asobi is muscular loitering—operations that serve no direct purpose. Bad habits are 'the dregs left where the laws of the universe were not fully obeyed'. In the relay-race image, the three runners not running are the slack.",m:"Stopping at a friend's house on the way to the corner store",s:"④ pp.88-96, 136-137"},r:["okori","ugoki-kesu","parallel-creation"]},
{id:"okori",c:"l2",ja:{t:"おこりを消す",y:"おこりをけす",d:"「位置について」を省き、常に「用意」＝ゼロ＋αで生きる。ボールは投げ上げず、指を開いて落とす――それだけで「おこり」が消える。膝の抜きとガマク入れが同時におこりを消す。",m:"「位置について、用意、ドン」",s:"④p.96-100／p.141-142"},en:{t:"Erasing the Telegraph (Okori)",d:"Skip 'on your marks' and live permanently at 'get set'—zero-plus-alpha. Do not toss the ball up; open your fingers and let it drop, and the telegraph vanishes. Knee release and gamaku engagement erase it simultaneously.",m:"'On your marks, get set, go'",s:"④ pp.96-100, 141-142"},r:["asobi","ugoki-kesu","knee-release","zero-alpha"]},
{id:"ugoki-kesu",c:"l2",ja:{t:"動作を消す",y:"どうさをけす",d:"視覚は情報の80％――見えなければ、その突きは存在しない。身体前面＝手品師のハンカチ、クシ（後）＝手品の種。広背筋は初動から80％の動きを隠し、腰の拳は相手の視覚から遮断された武器となる。",m:"手品師の種明かし構造",s:"④p.100-104"},en:{t:"Erasing the Motion",d:"Sight carries 80% of information—what cannot be seen does not exist. The front of the body is the magician's handkerchief; the kushi behind is the trick itself. The latissimus hides 80% of the motion from the first instant, and the fist at the hip becomes a weapon cut off from the opponent's vision.",m:"The anatomy of a magic trick",s:"④ pp.100-104"},r:["asobi","okori","latissimus"]},
{id:"naihanchi-dachi",c:"l2",ja:{t:"ナイファンチ立ちの真定義",y:"ないふぁんちだち",d:"足幅のことではない。クシ（腰＝股関節・大小腰筋）を正しく伸展させて立ち、クシ（後＝背骨・広背筋）も活用できる立ち方の総称であり、結び立ちでも可能。正しく立てば、足を広げるほど金的は後ろへ移動する。「へっぴり腰」に見えるのが正しい。",m:"似て非なるもの――見た目の足幅ではない",s:"④p.77-88"},en:{t:"The True Definition of Naihanchi Stance",d:"It is not a matter of foot width. It is the generic name for any standing in which the kushi (hip joints, psoas) is properly extended and the kushi (spine, latissimus) can also be used—possible even with feet together. Stood correctly, the wider the feet, the further back the groin retreats. Looking 'timid-hipped' is correct.",m:"A lookalike that is not the thing itself—never the visible foot width",s:"④ pp.77-88"},r:["hakamagoshi","kushi","naihanchi"]},
{id:"parallel-creation",c:"l2",ja:{t:"並列創出（パラレル・クリエーション）",y:"へいれつそうしゅつ",d:"新垣の造語であり、エネルギー創出の全体像。右逆突きなら、身体の1/4（右背中〜腰）が収縮して運動エネルギーを創出し、残る3/4は姿勢を保ったまま重力落下（膝の抜き＋ガマク）で位置エネルギーを放出する。相互否定の関係にある二種を同時に使う。上級者は1/4をさらに運動と位置に分割できる。",m:"四百メートルを四人が同時に走る／腕の90度移動実験",s:"④p.140-151"},en:{t:"Parallel Creation",d:"Arakaki's coinage for the complete picture of energy generation. In a right reverse punch, one quarter of the body (right back and hip) contracts to create kinetic energy, while the remaining three quarters, posture unchanged, release potential energy through gravitational fall (knee release + gamaku)—two mutually exclusive energies used at once. The adept can split that quarter again into kinetic and potential.",m:"Four runners running the 400 meters simultaneously; the 90-degree arm experiment",s:"④ pp.140-151"},r:["mech-energy","knee-release","gamaku","asobi"]},
{id:"koshi-mawase-error",c:"l2",ja:{t:"「腰を回せ」の誤解起源",y:"こしをまわせのごかい",d:"腸骨筋が足をやや内転させる働きだけを見た誤読が「腰を回せ」の起源。腰を回すと逆側の骨盤が後ろへ引かれ、位置エネルギーがマイナスに放出される――アクセルとブレーキを同時に踏むことに等しい。人は腰を回して歩かない。",m:"レース・カーの比喩",s:"④p.143"},en:{t:"Where 'Twist Your Hips' Went Wrong",d:"The instruction 'twist your hips' was born from misreading the iliacus's slight inward rotation of the leg. Twist the hips and the opposite pelvis is pulled backward, discharging potential energy negatively—like flooring the accelerator and the brake at once. No one walks by twisting the hips.",m:"The racing-car analogy",s:"④ p.143"},r:["iliacus","shurite-tsuki"]},
/* ---- Layer 3: Tactics ---- */
{id:"virtual-center",c:"l3",ja:{t:"仮想の重心",y:"かそうのじゅうしん",d:"身体の外（相手の前・後方・真横）に意識で作る重心。実際の重心を仮想の重心へ自然落下させることで技が出る。新垣理論の中心概念。",m:"胸を張る＝ダムの建設／大山倍達の額押さえの逸話",s:"①p.52-56／p.80"},en:{t:"The Virtual Center of Gravity",d:"A center of gravity created by intention outside the body—before, behind, or beside the opponent. Technique is born when the actual center free-falls toward the virtual one. The central concept of Arakaki's theory.",m:"Expanding the chest = building a dam; the Mas Oyama forehead anecdote",s:"① pp.52-56, 80"},r:["free-fall","fuantei","kan-no-me"]},
{id:"fuantei",c:"l3",ja:{t:"不安定の中の安定",y:"ふあんていのなかのあんてい",d:"安定したら歩けない・打てない。不安定だからこそ、仮想の重心に全体重を掛けられる。安定を求めることが、技を殺す。",m:"中国拳法のカウンターバランス／F・L・ライトの「滝の上の家」",s:"①p.49-51／p.135-136／p.162"},en:{t:"Stability Within Instability",d:"Once stable, you can neither walk nor strike. Precisely because you are unstable, your whole weight can be committed to the virtual center. Seeking stability kills the technique.",m:"Counterbalance in Chinese boxing; Frank Lloyd Wright's Fallingwater",s:"① pp.49-51, 135-136, 162"},r:["virtual-center","uku"]},
{id:"itsuki",c:"l3",ja:{t:"居着き",y:"いつき",d:"仮想の重心と実際の重心が一致して動けなくなった状態。身体だけでなく、心も、文化（言葉）までも居着く。「とどまる＝居着く＝敗退」。",m:"後屈立ち＝尺取虫のストップモーション／観空＝観念的居着き",s:"①p.60-62／p.138ほか全編"},en:{t:"Itsuki (Rootedness)",d:"The state in which the virtual and actual centers of gravity coincide and movement dies. Not only the body roots itself—so do the mind, and even culture and language. 'To halt is to root; to root is to lose.'",m:"Back stance as a frozen inchworm; Kanku as conceptual rootedness",s:"① pp.60-62, 138, et passim"},r:["virtual-center","zero-alpha","culture-itsuki"]},
{id:"time-creation",c:"l3",ja:{t:"時間の捻出",y:"じかんのねんしゅつ",d:"相手に気づかれない方法で動作を先行させ、相手の2倍の時間を持つこと。「感知できない20秒は、丸見えの10秒より速い」。",s:"①p.123-124／p.84"},en:{t:"Creating Time",d:"Advancing your motion by means the opponent cannot perceive, so that you hold twice his time. 'Twenty seconds unseen is faster than ten seconds in plain view.'",s:"① pp.123-124, 84"},r:["time","ugoki-kesu","muhyoshi"]},
{id:"shukuchiho",c:"l3",ja:{t:"縮地法",y:"しゅくちほう",d:"走らず「大きくまたいで」距離を消す方法。頭が上下しない二次元の動きになるため、相手には止まって見える。著者は若い頃、5メートルをまたげたという。",m:"障害物をまたぐ",s:"①p.82-84"},en:{t:"Shukuchiho (Ground-Shrinking Step)",d:"Erasing distance not by running but by 'striding over' it. The head does not bob—the motion becomes two-dimensional, and to the opponent you appear to stand still. In his youth the author could stride five meters.",m:"Stepping over an obstacle",s:"① pp.82-84"},r:["walking","distance-short"]},
{id:"muhyoshi",c:"l3",ja:{t:"無拍子",y:"むひょうし",d:"反動も拍子も無く技が出ること。「チョコンと出せば良い」。②ではシンコペーション（オフビート）として音楽的に説明される。長老たちの形の「何でもない動き」の正体。",s:"①p.84-85／②p.33-36"},en:{t:"Muhyoshi (No-Rhythm)",d:"Technique emerging without wind-up or beat—'just pop it out'. Vol. ② explains it musically as syncopation, the off-beat. This is the secret of the old masters' 'unremarkable' movements in kata.",s:"① pp.84-85; ② pp.33-36"},r:["constant-speed","okori","time-creation"]},
{id:"irimi",c:"l3",ja:{t:"入り身",y:"いりみ",d:"半身で相手の死角へ45度に入ること。沖縄空手には90度真横に入る方法まであり、新垣はこれを「人類の身体文化史の奇跡」と呼ぶ。大極（太極）の全移動が入り身である。",s:"①p.63-64／p.126-128"},en:{t:"Irimi (Entering)",d:"Entering the opponent's blind spot at 45 degrees in half-body posture. Okinawan karate even enters at a full 90 degrees to the side—Arakaki calls this 'a miracle in the history of human body culture'. Every movement of the Taikyoku kata is irimi.",s:"① pp.63-64, 126-128"},r:["hitoemi","isosceles"]},
{id:"no-gyakuzuki",c:"l3",ja:{t:"逆突きは無い",y:"ぎゃくづきはない",d:"膝の抜きで出す突きに、順・逆の区別はない。後ろ手の突きも「後ろ足が前にあるのと同じ」と考える。④では解剖学的に全面回収され、⑤では首里手の口伝その七として記される（連載『極意』序章第1話の原典）。",m:"ピッチャーは投げた後、一歩前に出る",s:"①p.86-87／④p.142／⑤p.194-195"},en:{t:"There Is No Reverse Punch",d:"A punch launched by knee release knows no 'lead' or 'reverse'. The rear-hand punch is treated 'as if the rear foot were already forward'. Vol. ④ resolves this anatomically, and Vol. ⑤ records it as oral teaching No. 7 of Shuri-te.",m:"A pitcher steps forward after the throw",s:"① pp.86-87; ④ p.142; ⑤ pp.194-195"},r:["knee-release","kuden-15"]},
{id:"kobo-icchi",c:"l3",ja:{t:"攻防一致",y:"こうぼういっち",d:"動く身体＝虚、意識が先に移動して作った仮想の重心＝実。コンビネーションの否定であり、「拳ひとつで良い」。",m:"塚原卜伝「ひとつの太刀」",s:"①p.129"},en:{t:"Attack and Defense as One",d:"The moving body is kyo, the illusory; the virtual center placed ahead by intention is jitsu, the real. A denial of combinations: 'one fist is enough'.",m:"Tsukahara Bokuden's hitotsu-no-tachi, the Single Sword",s:"① p.129"},r:["virtual-center","kyo-jitsu","one-thought"]},
{id:"hanno-yosoku",c:"l3",ja:{t:"相手の反応予測",y:"はんのうよそく",d:"形の最終段階。受けられた反動を利用し、仮想の重心を移して相手の一番嫌がる場所へ入る。主体と客体が交代する。",s:"①p.139-140"},en:{t:"Predicting the Opponent's Reaction",d:"The final stage of kata: use the rebound of a blocked technique, shift the virtual center, and enter where the opponent least wants you. Subject and object trade places.",s:"① pp.139-140"},r:["virtual-center","kata-def"]},
{id:"centerline",c:"l3",ja:{t:"正中線",y:"せいちゅうせん",d:"左右の筋肉の境目＝中央分断線。動かない（動かせない）からこそ身体内の「壁」になり、居着かずに最大エネルギーを出せる。カタツムリの殻のように、常に背負って闘う。スポーツは足で壁を作るため居着く。",m:"道路の中央分断線",s:"②p.48-56／p.76-77"},en:{t:"The Centerline",d:"The boundary between the body's left and right muscles—its median divide. Because it does not (cannot) move, it becomes the wall inside the body, allowing maximum energy without rooting. You carry it into battle always, like a snail its shell. Sport builds its wall with the legs—and roots itself.",m:"The median strip of a road",s:"② pp.48-56, 76-77"},r:["centerline-zero","centerline-match","zero-thought"]},
{id:"tenchisen",c:"l3",ja:{t:"天地線",y:"てんちせん",d:"腰にある、身体を唯一水平に分断できる線（新垣命名）。上下は繋がってはいけない。膝を（天地線に）激突させて蹴りのスナップを生む。",m:"鋼鉄のワイヤー＋鉄ハンマーの鞭",s:"②p.126-129"},en:{t:"The Heaven-Earth Line",d:"The only line that can divide the body horizontally—at the hips (Arakaki's coinage). Upper and lower body must not be connected. The knee is slammed against it to create the snap of the kick.",m:"A steel wire with an iron-hammer whip",s:"② pp.126-129"},r:["centerline","hamstring"]},
{id:"isosceles",c:"l3",ja:{t:"二等辺三角形",y:"にとうへんさんかっけい",d:"必勝の空間形。鋭角に自分の正中線をロック・インし、相手の鈍角（平面）から正中線を狙う。「角度が距離を創出する」――歩かずに90度を変換する。",m:"東郷平八郎のT字戦法／マグマの火山（腰を切る）",s:"②p.78-83"},en:{t:"The Isosceles Triangle",d:"The winning spatial form: lock your centerline into the acute angle and hunt the opponent's centerline from his obtuse, flat side. 'Angle creates distance'—a 90-degree conversion without taking a step.",m:"Admiral Togo's crossing of the T; a volcano of magma (cutting the hips)",s:"② pp.78-83"},r:["centerline","irimi"]},
{id:"kata-walls",c:"l3",ja:{t:"壁の間を歩く（形の壁）",y:"かべのあいだをあるく",d:"肩幅よりやや狭い2枚の見えない壁の間を歩くのが形であり、平面上360度に壁がある。目的は、相手の正中線を常に攻撃し、自分のそれを常に守ること。",m:"鋳型・枠・箍（たが）・身の規矩",s:"②p.84-92"},en:{t:"Walking Between the Walls",d:"Kata is walking between two invisible walls set slightly narrower than the shoulders—walls standing through all 360 degrees. The purpose: attack the opponent's centerline always, guard your own always.",m:"A casting mold, a frame, a barrel hoop—the carpenter's square of the body",s:"② pp.84-92"},r:["centerline","kata-def"]},
{id:"hitoemi",c:"l3",ja:{t:"一重身",y:"ひとえみ",d:"正対（居着き）は達人でも必ず起こる。なくせないから「隠す」――左右の身体をオーバーラップさせ、正中線を隠す身法。",m:"風船を狭い箱に入れる（押すと包み込む）",s:"②p.89-90"},en:{t:"Hitoemi (the Single-Fold Body)",d:"Facing the opponent square-on happens even to masters; since it cannot be eliminated, it is hidden—the left and right halves of the body overlapped to conceal the centerline.",m:"A balloon in a narrow box: push it and it enfolds you",s:"② pp.89-90"},r:["centerline","seitai-shinai","irimi"]},
{id:"hikite",c:"l3",ja:{t:"引き手不要論",y:"ひきてふようろん",d:"作用・反作用のために引き手を取るのは、武術では間違い。拳が腰にあるのは「手を遊ばせない」ためだけであり、突きは下げた腕からが最速である。",m:"西部劇の早撃ち",s:"②p.57-61"},en:{t:"Against the Chambered Hand",d:"Chambering the fist for 'action-reaction' is a martial error. The fist rests at the hip only so the hand is never idle—the fastest punch launches from a lowered arm.",m:"A Western gunslinger's quick draw",s:"② pp.57-61"},r:["latissimus","ugoki-kesu"]},
{id:"hyoshi-zero",c:"l3",ja:{t:"拍子ゼロ",y:"ひょうしぜろ",d:"タックルは究極の倒地法（拍子・間合いゼロ）。ゼロに勝てるのはゼロだけ――自分もタックルしながら蹴る。待ちのカウンターは必ず負ける。",m:"闘牛の角を相手に向ける",s:"②p.130-134"},en:{t:"Zero Rhythm",d:"The tackle is the ultimate falling-tree technique—zero rhythm, zero distance. Only zero beats zero: you too must kick while tackling. A waiting counter always loses.",m:"Turning the bull's horns on the opponent",s:"② pp.130-134"},r:["tochiho","muhyoshi"]},
{id:"one-third",c:"l3",ja:{t:"三分の一の法則",y:"さんぶんのいちのほうそく",d:"闘いは、形（自分）1/3＋組手（相手）1/3＋環境1/3で成り立つ。一つ欠けても武術は成り立たない。ケンカ屋が大会勝者に勝つ理由である。",s:"②p.93-94"},en:{t:"The Rule of Thirds",d:"A fight is one-third kata (yourself), one-third kumite (the opponent), one-third environment. Lacking any one, the martial art fails—which is why the street fighter beats the tournament champion.",s:"② pp.93-94"},r:["kata-def"]},
{id:"twenty-eighty",c:"l3",ja:{t:"二十―八十の法則",y:"にじゅうはちじゅうのほうそく",d:"真髄を解る者は上位20％のさらに20％（全体の4％）。教えられる者は、各世代に一人いれば上出来である。「武士（ブシ）が、そんなにいてたまるか！」",s:"②p.95-98"},en:{t:"The 20–80 Rule",d:"Those who grasp the essence are 20% of the top 20%—four in a hundred. One person per generation capable of teaching it is a fine harvest. 'You think bushi grow on trees?!'",s:"② pp.95-98"},r:["ko-no-shiso"]},
{id:"centerline-zero",c:"l3",ja:{t:"正中線＝究極のゼロ",y:"きゅうきょくのぜろ",d:"正中線とは2枚の面の交差線である。前から見たゼロ（運動系・中央分断線）×横から見たゼロ（位置系・重心線）＝0×0＝0。解剖しても存在しない「概念であり思想」。重心は第2仙椎の少し前にあり、背骨の真ん中ではない。",s:"③p.114-121"},en:{t:"The Centerline as Ultimate Zero",d:"The centerline is the intersection of two planes: the zero seen from the front (the kinetic divide) times the zero seen from the side (the gravity line)—0 × 0 = 0. Dissect the body and you will not find it: it is concept and philosophy. The center of gravity lies slightly forward of the second sacral vertebra, not in the middle of the spine.",s:"③ pp.114-121"},r:["centerline","zero-thought","mu-thought"]},
{id:"plus-move",c:"l3",ja:{t:"プラスで動く",y:"ぷらすでうごく",d:"武術はゼロ（静止）から動かない。常にプラス（すでに歩いている状態）で立ち、最大静止摩擦力を発生させない。100キロの身体を100キロ以下にして運ぶ――現行の空手は150キロにして運んでいる、と新垣は言う。",m:"バンパーカー（腰は回さない、添える）",s:"③p.123-126"},en:{t:"Moving from Plus",d:"The martial artist never moves from zero (rest). Stand always at plus—already walking—and static friction never gets its grip. Carry a 100-kilo body as less than 100 kilos; modern karate, says Arakaki, carries it as 150.",m:"Bumper cars—the hips are not twisted, only laid alongside",s:"③ pp.123-126"},r:["zero-alpha","itsuki"]},
{id:"box-creation",c:"l3",ja:{t:"箱の創出／飽和点の法則",y:"はこのそうしゅつ",d:"形で創出した箱（無の場）の真中に相手を置く。必勝の法則とは、相手と自分のエネルギー総和を箱の容積の飽和点（100）に合わせること――相手が80なら自分は20、相手が120ならマイナス20。捌きでもカウンターでもない第三の理念。「勝って打つ！」",m:"箱は己の観の目のみが観る",s:"③p.144-150"},en:{t:"Creating the Box / The Law of Saturation",d:"Place the opponent at the center of the box—the field of nothingness—created through kata. The law of certain victory: match the combined energy of both fighters to the box's saturation point of 100. If the opponent is 80, you are 20; if he is 120, you are minus 20. Neither deflection nor counter, but a third principle: 'Win, then strike!'",m:"Only your own kan-no-me can see the box",s:"③ pp.144-150"},r:["potential-field","kan-no-me","kata-box"]},
{id:"seitai-shinai",c:"l3",ja:{t:"正対しない",y:"せいたいしない",d:"相手に正面を向けない身体操作。ただし究極の達人同士は正中線を隠す必要がなくなり、「正対」で立って互いの「無」を見る――絶対不戦へと接続する。",s:"③p.83-86／p.151-152"},en:{t:"Never Face Square-On",d:"Body usage that never shows the opponent your front. Yet ultimate masters no longer need to hide their centerlines: they stand square-on and behold each other's mu—the gateway to absolute non-fighting.",s:"③ pp.83-86, 151-152"},r:["hitoemi","zettai-fusen"]},
{id:"genjigen",c:"l3",ja:{t:"減次元",y:"げんじげん",d:"日本武道の思考方法＝次元を減らすこと。相手が四次元で考えるとき三次元で処理すれば25％優位、二次元なら50％、一次元なら75％優位になる（武道は二割上の実力で完勝常勝）。単純化＝複→単・雑→純であり、「簡単化」ではない。",m:"「次元が違う」は比喩ではない",s:"④p.109-110"},en:{t:"Dimension Reduction",d:"The thinking method of Japanese budo: reduce dimensions. While the opponent computes in four dimensions, process in three and you hold a 25% advantage; in two, 50%; in one, 75% (in budo, 20% more skill means total victory every time). Simplification means complex-to-single, coarse-to-pure—not 'making it easy'.",m:"'On another dimension' is no metaphor",s:"④ pp.109-110"},r:["tanjunka","centerline-match"]},
{id:"centerline-match",c:"l3",ja:{t:"正中線の合致（マトと照星）",y:"せいちゅうせんのがっち",d:"相手の動かない正中線＝マト（標的）、自分の動かせない正中線＝サイト（照星）。両者の合致とは「動かぬ射手が動かぬ標的を射る」最高命中率の状態を常に作ること。我彼の正中線は常に一直線でなければならず、この一直線こそが一次元である（不動の線）。",m:"流鏑馬・弓道・クレー射撃・馬上の闘い――射手と標的の四場面",s:"④p.111-117"},en:{t:"Centerline Alignment: Target and Sight",d:"The opponent's unmoving centerline is the target; your immovable centerline is the gunsight. Alignment means perpetually creating the highest-accuracy condition—'a motionless marksman shooting a motionless mark'. The two centerlines must form one straight line, and that line is the single dimension (the immovable line).",m:"Four scenes of archer and target: yabusame, kyudo, clay shooting, mounted combat",s:"④ pp.111-117"},r:["centerline","genjigen","true-embusen"]},
{id:"gasshi",c:"l3",ja:{t:"合撃（ガッシ）",y:"がっし",d:"柳生新陰流の「切落とし」。やや遅れて振り降ろした剣は前方へのベクトルが大きく、相手の剣に「乗る」――時間差さえ一次元の線上で処理する「四次元を一次元で」の極意。「後の先」という説明では理解できない、と新垣は記す。十文字勝ちは合撃の応用。",m:"人中路（ジンチュウロ）＝柳生新陰流の正中線",s:"④p.106-108／p.118-119"},en:{t:"Gasshi (the Meeting Strike)",d:"The kiriotoshi of Yagyu Shinkage-ryu. The sword swung down a shade later carries the greater forward vector and 'rides' the opponent's blade—even the time difference is processed on a one-dimensional line: the fourth dimension handled in the first. 'Counter-initiative' explanations miss it, Arakaki writes. The cross-block victory is gasshi applied.",m:"Jinchuro, 'the road through the man's center'—Shinkage-ryu's centerline",s:"④ pp.106-108, 118-119"},r:["same-place","centerline-match","true-embusen"]},
{id:"distance-short",c:"l3",ja:{t:"距離を消す／短打",y:"きょりをけす",d:"「はやさ」の第三の要素は距離の短さである。時速200キロの列車より、徒歩で角のコンビニのほうが早い。腕が胴体から離れたとき、突きの半分は終わっている。",m:"「時速200キロの列車で、角のコンビニへ行くな」",s:"④p.60-66"},en:{t:"Erasing Distance: The Short Strike",d:"The third element of 'fastness' is shortness of distance. Walking to the corner store beats a 200-km/h train. By the time the arm leaves the torso, half the punch is already over.",m:"'Don't take a 200-km/h train to the corner store'",s:"④ pp.60-66"},r:["hayasa","shukuchiho"]},
{id:"zero-alpha",c:"l3",ja:{t:"ゼロ＋α",y:"ぜろぷらすあるふぁ",d:"居着かないとは、常に「ゼロ＋α」（すでに始動した状態）に立つこと。マイナスから技を出すと「あそび→居着き→あそび」の三重ロスになる。＋αを学べない形の修行は、悪癖の助長にしかならない。",m:"「位置について」ではなく、常に「用意」",s:"④p.92-100"},en:{t:"Zero Plus Alpha",d:"Not-rooting means standing always at 'zero plus alpha'—already in motion. Launch from minus and you pay the triple toll of slack, rooting, slack again. Kata practice that never teaches the plus-alpha only feeds bad habits.",m:"Never 'on your marks'—always 'get set'",s:"④ pp.92-100"},r:["plus-move","okori","itsuki"]},
/* ---- Layer 4: Perception & Mind ---- */
{id:"kan-no-me",c:"l4",ja:{t:"観の目",y:"かんのめ",d:"肉眼で見えない「仮想の重心」「仮想の足」を観る目。指導者の必須条件であり、「三年かかっても良師をさがせ」と言われる理由。③では「動作の一瞬一瞬をストロボのように見る目＋本質と現象を解析する能力」と再定義される。",m:"知花朝信が本部朝基のナイファンチに独り驚喜した逸話／三つ目の聖者の額の目",s:"①p.106-109／③p.4-5, p.123"},en:{t:"Kan-no-me (the Observing Eye)",d:"The eye that sees what the physical eye cannot: the virtual center, the virtual foot. It is the indispensable qualification of a teacher—the reason for the saying 'spend three years finding a true master'. Vol. ③ redefines it as a strobe-like perception of each instant combined with the power to analyze essence from phenomenon.",m:"Chibana Choshin alone marveling at Motobu Choki's Naihanchi; the third eye of the sage",s:"① pp.106-109; ③ pp.4-5, 123"},r:["virtual-center","shikan","box-creation"]},
{id:"kyo-jitsu",c:"l4",ja:{t:"虚と実",y:"きょとじつ",d:"エネルギーを発生させる仮想の重心＝実、身体の姿だけ＝虚。両者は刹那・刹那に入れ替わる。「虚が止まる時は、実が動く」。",m:"三本足の椅子と二本足の椅子",s:"①p.94-99／p.125／p.157"},en:{t:"Kyo and Jitsu (the Illusory and the Real)",d:"The virtual center that generates energy is jitsu, the real; the mere visible body is kyo, the illusory. The two exchange places instant by instant: 'when the illusory halts, the real moves'.",m:"A three-legged chair and a two-legged chair",s:"① pp.94-99, 125, 157"},r:["virtual-center","jitsu-only","kobo-icchi"]},
{id:"ki-shotai",c:"l4",ja:{t:"「気」の正体",y:"きのしょうたい",d:"「気」とは古代中国語の「エネルギー全般」（火気・蒸気・合気）。その実体は①ボディーランゲージの読解 ②五感＋判断＝第六感 ③未知の波動（あっても微弱）であり、人間が身体操作で使えるのは重力だけ。「気で人を飛ばす」は自己催眠であり、目隠し実験で気の達人は人を飛ばせなくなる。",s:"①p.144-149"},en:{t:"The True Identity of 'Ki'",d:"'Ki' is simply the ancient Chinese word for energy in general. Its actual substance: reading body language; the five senses plus judgment (the 'sixth sense'); and unknown waves—faint if they exist at all. The only force a human can wield through body mechanics is gravity. 'Throwing people with ki' is autosuggestion: blindfold the ki master and no one flies.",s:"① pp.144-149"},r:["gravity","culture-itsuki"]},
{id:"shinpo",c:"l4",ja:{t:"心法",y:"しんぽう",d:"形而上の理論と形而下の実践のあいだの舵とり。自分の心のコントロールと、相手の心へのそれ。沢庵の「心こそ心惑わす心なり」を、新垣はスポーツ心理学の頂点と評する。",s:"①p.152／p.158"},en:{t:"Shinpo (the Method of Mind)",d:"The helm between metaphysical theory and physical practice: control of one's own mind, and of the opponent's. Takuan's 'It is the mind that bewilders the mind'—for Arakaki, the summit of sports psychology written centuries early.",s:"① pp.152, 158"},r:["okame-hachimoku","yamiyo"]},
{id:"okame-hachimoku",c:"l4",ja:{t:"岡目八目",y:"おかめはちもく",d:"武道の極意とは、闘う当事者ではなく「岡」（第三者）になり、双方の仮想の重心を刹那ごとに見極めること。植芝盛平は第三者の目を持ち、究極の合気とは宇宙自体になることだった。",s:"①p.152-153"},en:{t:"Okame-Hachimoku (the Bystander Sees Eight Moves Ahead)",d:"The secret of budo: become not a combatant but the onlooker on the hill, reading both fighters' virtual centers instant by instant. Ueshiba Morihei possessed this third-person eye; his ultimate aiki was to become the universe itself.",s:"① pp.152-153"},r:["kan-no-me","virtual-center"]},
{id:"bu-gorisei",c:"l4",ja:{t:"武の合理性",y:"ぶのごうりせい",d:"武とは徹頭徹尾、合理性である。理論だけ（理論倒れ）でも肉体だけ（益荒男ぶり）でも不覚をとる。筋肉で日本刀は防げない――示現流と対峙した首里武士の現実。",s:"①p.145, p.150-151／②p.119-120"},en:{t:"The Rationality of Bu",d:"The martial is rationality through and through. Theory alone stumbles; muscle alone falls. No muscle stops a katana—the reality faced by the Shuri bushi who stood before Jigen-ryu swordsmen.",s:"① pp.145, 150-151; ② pp.119-120"},r:["two-principles","hist-ti"]},
{id:"shitsuryo-henka",c:"l4",ja:{t:"質量変化の法則",y:"しつりょうへんかのほうそく",d:"反復練習によって技だけが一段上へ行き、自分の技が自分に見えなくなる（南郷継正の言葉）。視覚で確認できないからこそ巻藁を突く。見えない前蹴りの代償は「ブッチ！」という肉離れだった、と新垣は自らの体験を記す。",s:"②p.113-114"},en:{t:"The Law of Qualitative Change",d:"Through repetition the technique alone ascends a level—until you can no longer see your own technique (Nango Tsugumasa's phrase). That is why one strikes the makiwara: to confirm what sight cannot. The price of an invisible front kick, Arakaki recalls, was the loud rip of his own muscle.",s:"② pp.113-114"},r:["kan-no-me"]},
{id:"meishika",c:"l4",ja:{t:"名詞化批判",y:"めいしかひはん",d:"身体操作を名詞で表すことは、一瞬の動きを止めて取り出すこと＝技を殺すこと。沖縄は動詞で教えた――「真っ直ぐ、倒れるように突け！」。教えは「出来た！」「まだダメだ！」だけで通じた。",s:"②p.37-38"},en:{t:"The Critique of Nouns",d:"To name a body operation with a noun is to freeze and extract one instant of motion—to kill the technique. Okinawa taught in verbs: 'Punch straight, as if falling!' Instruction needed only two utterances: 'You have it!' and 'Not yet!'",s:"② pp.37-38"},r:["tachikata-nai","language-limit"]},
{id:"yamiyo",c:"l4",ja:{t:"闇夜に霜を聞く",y:"やみよにしもをきく",d:"「闇夜に霜が降りる」ほどの無音・等速の身体操作の達人に対抗する唯一の手段は、心気納まる状態で「霜を聞く」こと。この心法の必要が生じた瞬間、武道は身体文化から心身文化へ昇華した、と新垣は位置づける。千葉周作『剣法秘訣』の奥義。",s:"③p.130-132／④p.181"},en:{t:"Hearing the Frost on a Dark Night",d:"Against a master who moves soundlessly and evenly 'like frost falling on a dark night', the only recourse is a settled mind that can hear the frost fall. The moment this became necessary, Arakaki argues, budo rose from body culture to mind-body culture. The inner secret of Chiba Shusaku's Kenpo Hiketsu.",s:"③ pp.130-132; ④ p.181"},r:["constant-speed","shinpo","chiba-shusaku"]},
{id:"setsuna",c:"l4",ja:{t:"刹那",y:"せつな",d:"仏教で1/75秒。日本武道の身体操作は、すべて刹那に間に合うことを前提に成り立つ。「アッ！」では遅い――許されるのは「ア」だけ、「ドン」ではなく「ド」だけ。",m:"大森曹玄「いまといふ、いまなる時は、なかりけり、まの時くれば、いの時は去る」",s:"④p.132-133"},en:{t:"Setsuna (the Instant)",d:"In Buddhism, one seventy-fifth of a second. Every body operation of Japanese budo presupposes arriving within the setsuna. 'Ah!' is already too late—only the 'A' is permitted; not the 'DON' but only the 'D'.",m:"Omori Sogen's poem: by the time 'ma' of 'ima' (now) arrives, the 'i' is already gone",s:"④ pp.132-133"},r:["chokkan","chokudo","time"]},
{id:"chokkan",c:"l4",ja:{t:"直感＝並列処理",y:"ちょっかん",d:"日本人の「カンの良さ」の正体は、五感から得た情報を並列的に瞬時に処理して本質を掴む認知（パラレル・プロセシング）。脳の辺縁系（古い脳・高速）で処理し、訓練によって並列のまま処理できるようになる。",m:"「日本語は論理的でない」と「日本人はカンが良い」は同根",s:"④p.155-157"},en:{t:"Intuition as Parallel Processing",d:"The vaunted Japanese 'intuition' is cognition that processes the five senses' input in parallel, instantly, to seize the essence. It runs on the limbic system—the old, fast brain—and training makes fully parallel processing possible.",m:"'Japanese is illogical' and 'the Japanese have uncanny intuition' share one root",s:"④ pp.155-157"},r:["setsuna","chokudo","nijugokan"]},
{id:"chokudo",c:"l4",ja:{t:"直動",y:"ちょくどう",d:"直感の出力版（新垣の概念）。武術的に正しいのは「直動」であり、決して「連動」ではない――連ねて動くと刹那に間に合わない。連動した突きは舞台の殺陣であり、相手からまる見えである。",s:"④p.152"},en:{t:"Chokudo (Direct Action)",d:"The output counterpart of intuition (Arakaki's concept). What is martially correct is direct action, never chained action—link the movements in sequence and you miss the setsuna. A 'linked' punch is stage swordplay, in full view of the opponent.",s:"④ p.152"},r:["chokkan","setsuna","parallel-creation"]},
{id:"iki",c:"l4",ja:{t:"閾（イキ）＝殺気の正体",y:"いき",d:"閾（Threshold）＝特定の感覚が生じるポイント（知覚研究の用語）。達人とは、五感の情報収集が敏感で、危険の程度を知らせる「閾」が明確な人間である。「生命の危険の閾」が脳内で赤信号を照らす――これが古来「殺気」と呼ばれたもの。",m:"横の閾（単独閾）と縦の閾（重複閾）の二方式",s:"④p.158-159"},en:{t:"Iki (Threshold): The True Identity of Sakki",d:"The threshold—the point at which a given sensation arises (a term from perception research). The master is one whose senses gather keenly and whose danger thresholds are sharply defined. When the 'threshold of mortal danger' flashes red in the brain—that is what the ancients called sakki, the scent of killing intent.",m:"Two systems: lateral (single) thresholds and vertical (compound) thresholds",s:"④ pp.158-159"},r:["nijugokan","chokkan"]},
{id:"nijugokan",c:"l4",ja:{t:"二十五感／武道の共感覚",y:"にじゅうごかん",d:"視覚の80％独占を抑え、五感を相互否定で高めた上で相互相関で複合使用する――1＋1＋1＋1＋1＝5ではなく、5×5＝25の「二十五感」。「耳で見る」「皮膚で聞く」とは、共感覚（シトーウィク博士）の不随意な部分を随意的に利用したもの、と新垣は説く。",m:"プロペラの羽（各感覚の閾）と軸（縦の閾）の図",s:"④p.158-163"},en:{t:"The Twenty-Five Senses: Budo's Synesthesia",d:"Restrain vision's 80% monopoly, sharpen each sense through mutual negation, then use them in mutual correlation: not 1+1+1+1+1=5 but 5×5=25—the twenty-five senses. 'Seeing with the ears', 'hearing with the skin': the involuntary phenomenon of synesthesia (Dr. Cytowic) turned voluntary, Arakaki proposes.",m:"The propeller diagram: blades as each sense's threshold, the shaft as the vertical threshold",s:"④ pp.158-163"},r:["iki","chokkan"]},
{id:"shikan",c:"l4",ja:{t:"止観",y:"しかん",d:"止まった物を観るのでも、動きを止めて観るのでもない――「流動する万物の本質を観る」こと。動いている状態が止まって観えるところまで観の目を高める。武道的には「居着く」ことでも「死に体」でもない。",m:"テレビのストップ・モーションではない",s:"④p.175"},en:{t:"Shikan (Stillness-Insight)",d:"Neither watching a stopped object nor stopping motion to watch it, but seeing the essence of all things in flux—raising the observing eye until moving things appear still. Martially, it is neither rooting nor dead body.",m:"Not a television freeze-frame",s:"④ p.175"},r:["kan-no-me","setsuna"]},
{id:"kuki-no-kabe",c:"l4",ja:{t:"空気の壁（著者の体験）",y:"くうきのかべ",d:"ナイファンチ修行期の組手で、黄色い戸板のような空気の壁が相手の技に先行して観え、綿毛のようにすり抜け、気づけば相手の真後ろにいた――という新垣自身の体験。正体は脳内の事実（自己像幻視の一形態）と自己分析される。この境地なら百戦不敗も夢ではない。しかし禅では初歩〜中級であり、止めれば野狐禅で終わる。",m:"相手は幽霊を見たように真っ青になり、一週間口を利けなかった",s:"④p.163-164"},en:{t:"The Wall of Air (the Author's Experience)",d:"During his Naihanchi years, Arakaki saw walls of air like yellow doors preceding his opponent's techniques, slipped through them like thistledown, and found himself behind the man. He analyzes it as a fact of the brain—a form of autoscopy. In that state, a hundred fights without defeat is no dream; yet in Zen it is beginner-to-intermediate ground, and to stop there is to end as a wild-fox heretic.",m:"The opponent went white as if he had seen a ghost, and could not speak for a week",s:"④ pp.163-164"},r:["nijugokan","kan-no-me"]},
/* ---- Layer 5: Philosophy ---- */
{id:"shakuriki",c:"l5",ja:{t:"借力（チャクリキ）",y:"しゃくりき",d:"エネルギー利用の最終段階＝宇宙から与えられたものを使わせてもらうこと。自分の理論も技も、宇宙の主からの借り物である。",s:"①p.80-81／p.122"},en:{t:"Shakuriki (Borrowed Power)",d:"The final stage of energy use: borrowing what the universe grants. One's theories and techniques alike are on loan from the master of the universe.",s:"① pp.80-81, 122"},r:["energy-3stages","gravity"]},
{id:"ko-no-shiso",c:"l5",ja:{t:"個の思想",y:"このしそう",d:"武道（術）は「個」から「個」への伝承であり、自得は個人の武才と努力のみによる。昔の空手家が流派名を嫌った理由である。",s:"①p.115／p.142／p.153"},en:{t:"The Philosophy of the Individual",d:"The martial art passes from one individual to another; mastery comes only through personal talent and personal effort. This is why the old karate men disliked school names.",s:"① pp.115, 142, 153"},r:["hyakuren-jitoku","twenty-eighty"]},
{id:"hyakuren-jitoku",c:"l5",ja:{t:"百練自得",y:"ひゃくれんじとく",d:"沖縄空手に伝書は無い。「個々の肉体が伝書である」。修行の果てに真伝を自得する以外に道はない。",s:"①p.114-116"},en:{t:"Hyakuren-Jitoku: A Hundred Forgings, Self-Attained",d:"Okinawan karate has no written scrolls: 'each body is the scroll'. There is no path but to attain the true transmission oneself, at the far end of training.",s:"① pp.114-116"},r:["ko-no-shiso","kata-dna"]},
{id:"muso",c:"l5",ja:{t:"無想（会名の由来）",y:"むそう",d:"守→破→離の先、「形を棄てる」――生きていること自体が空手となる無念無想の境地への決意と憧れ。無想会の名の由来である。",s:"①p.125"},en:{t:"Muso (the Name of the School)",d:"Beyond shu-ha-ri lies the casting away of form—the state of no-thought in which living itself becomes karate. The resolve toward, and longing for, that state gives Muso-kai its name.",s:"① p.125"},r:["mu-thought","kata-def"]},
{id:"heiho",c:"l5",ja:{t:"兵法から平法へ",y:"へいほうからへいほうへ",d:"観の目は政治・軍事・芸術などあらゆる人間の営みに通じる（諸葛孔明・ライト・ミケランジェロ・書道・焼き物）。宇宙の目で観れば我も彼も生かされている一員であり、闘いの武道が平和に役立つものへ生まれ変わる。",s:"①p.163-164"},en:{t:"From the Art of War to the Art of Peace",d:"The observing eye reaches every human endeavor—statecraft, war, art (Zhuge Liang, Wright, Michelangelo, calligraphy, pottery). Seen with the universe's eye, self and other are both members kept alive by it, and the budo of fighting is reborn as something that serves peace.",s:"① pp.163-164"},r:["kan-no-me","michi-doyu"]},
{id:"culture-itsuki",c:"l5",ja:{t:"文化の居着き",y:"ぶんかのいつき",d:"言葉（気・手刀・観空）や文明（漢方・中国科学）も居着く。「気」の一語で説明した気になり、考察を放棄した東洋の停滞を新垣は指摘する。",s:"①p.62／p.118／p.148-149"},en:{t:"Cultural Rootedness",d:"Words (ki, shuto, kanku) and civilizations (Chinese medicine, Chinese science) can also root themselves. Arakaki points to the stagnation of the East, content to 'explain' with the single word ki and abandon inquiry.",s:"① pp.62, 118, 148-149"},r:["itsuki","ki-shotai","language-limit"]},
{id:"bujutsu-gensen",c:"l5",ja:{t:"武術という源泉",y:"ぶじゅつというげんせん",d:"武道とは、武術から生まれた智恵を礼儀・倫理にまで高めたもの。源泉である武術が涸れれば、武道も涸れる。",s:"①p.168-169（あとがき）"},en:{t:"The Wellspring Called Bujutsu",d:"Budo is the wisdom born of the fighting art raised to courtesy and ethics. If the wellspring—the fighting art itself—runs dry, budo dries with it.",s:"① pp.168-169 (afterword)"},r:["tahiti","michi-doyu"]},
{id:"tahiti",c:"l5",ja:{t:"タヒチ語の比喩",y:"たひちごのひゆ",d:"源流（武術）を知れば末流（スポーツ空手）は理解できる。逆は絶対に不可能――身体操作がまったく逆だからである。",s:"②p.152-153（あとがき）"},en:{t:"The Tahitian Metaphor",d:"Know the source—the martial art—and the tributary, sport karate, is intelligible. The reverse is forever impossible, for the body mechanics run in opposite directions.",s:"② pp.152-153 (afterword)"},r:["bujutsu-gensen"]},
{id:"shiru-naru",c:"l5",ja:{t:"知ることとは、成ること",y:"しることとはなること",d:"身につけた力も技も、自分のものになった時に捨て去れる。捨てた後に技が生まれる。ただし基礎体力は「捨てるために獲得する」最大の財産である。",s:"②p.44-46／③p.154"},en:{t:"To Know Is to Become",d:"Strength and technique can be cast away only once they have truly become yours—and after the casting away, technique is born. Basic conditioning remains the greatest asset: acquired precisely in order to be discarded.",s:"② pp.44-46; ③ p.154"},r:["zettai-mu","hyakuren-jitoku"]},
{id:"kaimei-shimei",c:"l5",ja:{t:"解明の使命",y:"かいめいのしめい",d:"「アラカキ、ここまでは書くな！」と先達に叱られても書く――沖縄でさえ武術が死滅寸前であることに加え、日本人が解明しなければアングロ・サクソンが先に解明してしまうから、と新垣は記す。",s:"②p.154（あとがき）"},en:{t:"The Mission to Decode",d:"'Arakaki, do not write this far!'—the elders scolded, and he wrote anyway. The art lies near death even in Okinawa; and if the Japanese do not decode it, Arakaki writes, the Anglo-Saxons will decode it first.",s:"② p.154 (afterword)"},r:["bunka-gekitotsu","budo-science"]},
{id:"mu-thought",c:"l5",ja:{t:"無の思想",y:"むのしそう",d:"無はゼロではない。プラスもマイナスも、ゼロさえも生まれる以前の状態（陰陽・ロゴス／パトス以前）。日本武道の根源思想であり、「相互否定」と「相互依存」の関係から成る修行方法でもある。",s:"③p.136-137／p.53-57"},en:{t:"The Philosophy of Mu (Nothingness)",d:"Mu is not zero: it is the state before plus and minus—before even zero—was born; before yin-yang, before logos and pathos. The root philosophy of Japanese budo, and a method of training built on mutual negation and mutual dependence.",s:"③ pp.136-137, 53-57"},r:["zero-thought","zettai-mu","one-thought"]},
{id:"one-thought",c:"l5",ja:{t:"一つの思想",y:"ひとつのしそう",d:"最初の一つを完璧にマスターすること、最初の一人を完璧に破ることを究極とする（一つの太刀）。一つの思想があるから、無の思想にいたれる。身体での具現化＝正中線、無の具現化＝箱。",s:"③p.138-139／p.150-151"},en:{t:"The Philosophy of One",d:"Master the first one perfectly; defeat the first single opponent perfectly—that is the ultimate (the Single Sword). Only through the philosophy of one can one reach the philosophy of mu. Its embodiment in the flesh is the centerline; the embodiment of mu is the box.",s:"③ pp.138-139, 150-151"},r:["mu-thought","centerline","box-creation"]},
{id:"zettai-fusen",c:"l5",ja:{t:"絶対不戦",y:"ぜったいふせん",d:"究極の達人同士は「正対」で立ち、互いの「無」を見る――そして闘わなくなる。「武」を「無」のフィルターに通すことで「不戦」という矛盾する状態にまで変化させたことこそ、日本武道の素晴らしさである。",s:"③p.151-152"},en:{t:"Absolute Non-Fighting",d:"Ultimate masters stand square to each other, behold each other's mu—and do not fight. To pass 'the martial' through the filter of nothingness until it becomes its own contradiction, non-fighting: therein, says Arakaki, lies the glory of Japanese budo.",s:"③ pp.151-152"},r:["seitai-shinai","zettai-mu","mu-thought"]},
{id:"zettai-mu",c:"l5",ja:{t:"絶対無",y:"ぜったいむ",d:"日本武道の特異点は、武を他人ではなく自分への抑制力にしたこと。争いは相対的な欲から生まれ、絶対的な無からは生まれない。達人は最後に箱の枠を自ら取り除き、小宇宙＝宇宙（無窮無辺）となる。創出できた者だけが、無くすことができる。最高・最強の境地。",s:"③p.153-155"},en:{t:"Absolute Mu",d:"The singularity of Japanese budo: turning the martial into a restraint upon oneself rather than upon others. Conflict is born of relative desire, never of absolute nothingness. At the last, the master removes the walls of his own box, and the microcosm becomes the cosmos, boundless. Only one who could create it can erase it. The highest and strongest state.",s:"③ pp.153-155"},r:["zettai-fusen","box-creation","muso"]},
{id:"kata-dna",c:"l5",ja:{t:"形＝民族のDNA",y:"かたはみんぞくのDNA",d:"形とは、言葉によらず五感による認識方法で民族のDNAに伝えた身体操作の集合体である。現代空手家はそのDNAの存在すら知らず、形は体操・踊りになった、と新垣は警告する。",s:"③p.3-4（はじめに）"},en:{t:"Kata as the DNA of a People",d:"Kata is a corpus of body operations transmitted into a people's DNA not through words but through the recognition of the five senses. Modern karateka, Arakaki warns, do not even know that DNA exists—and kata has become gymnastics and dance.",s:"③ pp.3-4 (introduction)"},r:["kata-def","hyakuren-jitoku"]},
{id:"jitsu-only",c:"l5",ja:{t:"実（ジツ）のみ",y:"じつのみ",d:"武道は一定レベルから上は「虚実」ではなく「実」のみ。虚とは、実に成り切れなかった部分・残滓である。武道の修行とは宇宙の原理・原則を自らの身で感じることであり、その原理・原則こそが「実」。「消す」は能動ではなく受動（相手から「消えた」）。武道とは「実」と「実」の対峙、「真」と「真」の鎬の削り合いである。",s:"④p.101-104"},en:{t:"Jitsu Alone",d:"Above a certain level, budo is not kyo-jitsu but jitsu alone; the illusory is merely the residue that failed to become real. Training is feeling the universe's principles in one's own flesh—and those principles are the real. 'Vanishing' is passive, not active: one has vanished from the opponent. Budo is the confrontation of real with real, truth grinding against truth.",s:"④ pp.101-104"},r:["kyo-jitsu","hayasa"]},
{id:"tanjunka",c:"l5",ja:{t:"単純化＝日本文化の極意",y:"たんじゅんか",d:"日本文化が世界に誇る思想とは単純化（Simplify）であり、複雑にすることではない。相互否定の段階＝物事を単純化することであり、その極致がナイファンチ＝禅の「放下著（ホウゲジャク）」（己の存在さえ否定する相互否定）である。",m:"脳の情報処理を「はやく」するには、単純化が一番効果的",s:"④p.120-121"},en:{t:"Simplification: The Essence of Japanese Culture",d:"The thought Japan offers the world is simplification—never complication. The stage of mutual negation is the simplifying of things, and its extreme is Naihanchi: Zen's hogejaku, the mutual negation that denies even one's own existence.",m:"Nothing speeds the brain's processing like simplification",s:"④ pp.120-121"},r:["genjigen","naihanchi-hogejaku","naihanchi"]},
{id:"mugendai-zero",c:"l5",ja:{t:"無限大になるから、ゼロになる",y:"むげんだいになるから",d:"リレーの選手を無限に増やせば、一人の走る距離はゼロに近づく――相互否定の究極。無限の筋肉群（筋肉一つ一つに脳がある）を動員して、個々の動作をゼロに近づけるのが沖縄空手の究極の思想である。",m:"十人なら40m、百人なら4m",s:"④p.137-138"},en:{t:"Approaching Infinity, Approaching Zero",d:"Add relay runners without limit and each one's distance approaches zero—the ultimate of mutual negation. Okinawan karate's final thought: mobilize infinite muscle groups (each muscle with its own brain) until every individual motion approaches zero.",m:"Ten runners: 40 m each. A hundred: 4 m",s:"④ pp.137-138"},r:["parallel-creation","asobi"]},
{id:"series-parallel-truth",c:"l5",ja:{t:"直列と並列の間に真理",y:"ちょくれつとへいれつ",d:"真理とは「直列と並列の間に横たわるものでしかない」＝二者の相対関係の間にしかない（西田幾多郎「絶対矛盾的自己同一」の境地）。並列も絶対ではない――刹那に間に合うから効率が良いだけ。すべての真理は但し書き付きである。",m:"ゲーデルの不完全性定理＝理性の限界の証明",s:"④p.178-179"},en:{t:"Truth Lies Between Series and Parallel",d:"Truth 'lies only between the serial and the parallel'—only in the relation of the two (the ground of Nishida Kitaro's absolutely contradictory self-identity). Even parallel is not absolute: it is efficient only because it arrives within the setsuna. Every truth comes with a proviso.",m:"Gödel's incompleteness theorem: the proof of reason's limits",s:"④ pp.178-179"},r:["chokkan","budo-science","nishida"]},
{id:"budo-science",c:"l5",ja:{t:"武道＝完成した科学",y:"ぶどうはかんせいしたかがく",d:"禅の修業体系を取り入れた武道は、それだけで完成した科学である――情報の取得→処理→決断→行動まで体系立てて構築された自然・社会科学。ただ言語で説明されることが無かっただけ。「曰く言い難し」の領域は、言語で証明できる限界まで突きつめた後でなければならない（神秘のカバーの戒め）。",m:"禅は不立文字を掲げつつ、法戦（言語の徹底応酬）を持つ",s:"④p.179-182"},en:{t:"Budo as a Completed Science",d:"Budo that absorbed the Zen training system is, in itself, a completed science—information gathering, processing, decision, action, all systematically built. It simply was never explained in words. The realm of 'the ineffable' may be invoked only after language has been driven to its provable limit: a warning against the cover of mystery.",m:"Zen raises 'no reliance on words'—yet keeps hossen, the total verbal duel",s:"④ pp.179-182"},r:["shinpi","kaimei-shimei","language-limit"]},
{id:"shinpi",c:"l5",ja:{t:"神秘主義の再定義",y:"しんぴしゅぎ",d:"本来の神秘主義とは「万物は言語ですべて表示できない」という認識に立つ、真理の探究方法の一つ（ラッセル『西洋哲学史』の論理主義との対比）。言語の役割は五感を誘発して本質に迫ること（俳句・墨絵）。シンボルを共用しない体系からは意味不明に見える――「形は使えない」という誤解の正体である。",s:"④p.172-174／p.180"},en:{t:"Mysticism Redefined",d:"True mysticism is a method of inquiry standing on the recognition that not all things can be expressed in language (contrasted with logicism in Russell's History of Western Philosophy). Language's role is to provoke the senses toward the essence—as haiku and ink painting do. From outside the shared symbol system it looks like nonsense: the very anatomy of the misunderstanding that 'kata doesn't work'.",s:"④ pp.172-174, 180"},r:["budo-science","kata-tsukaenai"]},
{id:"michi-doyu",c:"l5",ja:{t:"術から道へ／道友",y:"じゅつからみちへ・どうゆう",d:"術＝動物の本能的な脳を活用した生存手段（生きとし生けるものの義務）。道＝術の体系を大脳新皮質の思惟で普遍化し、人類すべてに当てはめた文明。空手の同胞は世界中のすべての人間であり、武道の「道」とは護身の心身文化を通した友達（トモガキ）＝道友である。",m:"動物の部分を忘れれば地球を破壊し、人間の部分を失えば義と愛を失う",s:"④p.183-184"},en:{t:"From Art to Way: The Fellowship of the Path",d:"Jutsu is survival skill using the animal brain—the duty of every living thing. Do, the Way, is that system universalized by the neocortex and extended to all humankind. Karate's kin are all people of the world; the 'do' of budo is friendship through the mind-body culture of self-protection—doyu, fellows of the way.",m:"Forget the animal and we destroy the earth; lose the human and we lose duty and love",s:"④ pp.183-184"},r:["heiho","bujutsu-gensen"]},
{id:"bunka-gekitotsu",c:"l5",ja:{t:"文化の激突",y:"ぶんかのげきとつ",d:"現代空手家の使命とは、古伝をオリジナルの方法で解明した後、西洋スポーツ理論と激突させ、より高度な心身文化を創出すること。近代空手の悲劇の根源は、日本人が自らの思想の重要性を証明できなかったことにある。脳科学の発達で並列処理の優秀性を証明できる環境が整った今、21世紀の空手家は幸運な人間である。",s:"④p.167／p.170-171"},en:{t:"The Collision of Cultures",d:"The modern karateka's mission: decode the classical art by its own original method, then collide it with Western sports theory to create a higher mind-body culture. The root tragedy of modern karate was Japan's failure to prove the worth of its own thought. Now that brain science can demonstrate the superiority of parallel processing, the 21st-century karateka is a fortunate human being.",s:"④ pp.167, 170-171"},r:["kaimei-shimei","chokkan"]},
{id:"shitataka",c:"l5",ja:{t:"したたかな存在感",y:"したたかなそんざいかん",d:"④あとがきの核心。新垣はマザー・テレサのもとで「死にいく者たち」を看取り、死者の「したたかな存在感」（小林秀雄）を学んだ。空手修行の究極の問いとは、それを生きる上でもてるのか、ということ。「この段階までいけたら死んでも良い」とすべてを擲ったナイファンチ修行は、ガンジス川を渡ることだった。",m:"「道とは、往くことにこそ意味がある」",s:"④p.185-189（あとがき）"},en:{t:"An Unshakable Presence",d:"The heart of Vol. ④'s afterword. Under Mother Teresa, Arakaki tended the dying and learned from the dead their 'unshakable presence' (Kobayashi Hideo's phrase). The final question of karate training: can you carry that presence while alive? The Naihanchi training into which he threw everything—'if I can reach this stage, I can die'—was his crossing of the Ganges.",m:"'The meaning of the Way lies in the going'",s:"④ pp.185-189 (afterword)"},r:["michi-doyu","muso"]},
/* ---- Kata Theory ---- */
{id:"naihanchi",c:"kata",ja:{t:"ナイファンチ",y:"ないふぁんち",d:"前方への歩きを完全に真横で行う形。「空手はナイファンチにはじまり、ナイファンチに終わる」。目付けは頭の前傾の代用であり、最終目標は真横90度への縮地法。思想の中核をなす基本形で、これができたら師の紹介で他師の形（パッサイ等）へ進んだ――「誰からナイファンチを学んだか」が最重要だった。",s:"①p.92-105／②p.96-97"},en:{t:"Naihanchi",d:"The kata that performs forward walking entirely sideways. 'Karate begins with Naihanchi and ends with Naihanchi.' The gaze substitutes for the head's forward lean; the final goal is shukuchiho at a full 90 degrees to the side. It is the core kata of the entire philosophy—once learned, one's master introduced you to other teachers for other kata. 'From whom did you learn Naihanchi?' was the question that mattered most.",s:"① pp.92-105; ② pp.96-97"},r:["naihanchi-dachi","naihanchi-hogejaku","naihanchi-only","shukuchiho"]},
{id:"kata-sanbunrui",c:"kata",ja:{t:"形の三分類",y:"かたのさんぶんるい",d:"基本形（思想の中核＝ナイファンチ／三戦）・鍛錬形・応用形（創作者の得意技集で、他人には役立たないこともある）の三つに分けられる。",s:"①p.91"},en:{t:"The Three Classes of Kata",d:"Foundation kata (the philosophical core: Naihanchi, Sanchin), conditioning kata, and application kata—the last being collections of their creators' favorite techniques, not always useful to others.",s:"① p.91"},r:["naihanchi","oyo-kata"]},
{id:"kata-def",c:"kata",ja:{t:"古伝の形の定義",y:"こでんのかたのていぎ",d:"A→A'→A''と連続変化し、どの瞬間をとっても倒地法で技が出せる姿勢の流れ――それが古伝の形である。AとBのポーズだけを取り出せば形骸化する。形は視覚に訴えるものが何一つない「三次元の無の空間」に壁を見出す、観の目の養成装置でもある。",s:"②p.86-88"},en:{t:"The Classical Definition of Kata",d:"Kata is a flow changing continuously—A to A′ to A″—in which, at any instant whatsoever, a technique can be delivered by the falling-tree method. Extract only poses A and B and it fossilizes. Kata is also the training device of the observing eye: finding walls in a three-dimensional space of nothingness where nothing appeals to sight.",s:"② pp.86-88"},r:["tochiho","kata-walls","kan-no-me"]},
{id:"taikyoku-saisei",c:"kata",ja:{t:"大極の再生",y:"たいきょくのさいせい",d:"体操用と見なされる形（大極）も、5つ4種類の立ち方と入り身によって武術に再生できる――①の「形の再生」実証パート。",s:"①p.126-128"},en:{t:"Reviving the Taikyoku",d:"Even a kata dismissed as calisthenics can be reborn as martial art through the four kinds of stepping and irimi—Vol. ①'s demonstration of kata resurrection.",s:"① pp.126-128"},r:["irimi","kata-def"]},
{id:"kata-yuretsu",c:"kata",ja:{t:"形の優劣と見た目",y:"かたのゆうれつ",d:"形の優劣は、重力と時間の効率で決まる。「良い形」と「悪い形」の区別が沖縄には暗黙にあった。実戦の形は見栄えがしない（残像が残らない）――見栄えの要求が、形を居着く方向（後屈立ち等）へ変質させた。",s:"①p.124／p.138-139"},en:{t:"Good Kata, Bad Kata",d:"A kata's worth is decided by its efficiency with gravity and time; Okinawa tacitly distinguished good kata from bad. Combat-true kata is unimpressive to watch—it leaves no afterimage—and the demand for spectacle bent kata toward rootedness.",s:"① pp.124, 138-139"},r:["two-principles","itsuki"]},
{id:"hitoiki",c:"kata",ja:{t:"一息の長さ",y:"ひといきのながさ",d:"沖縄の形は、全速で行えば一息で終わる長さしかない。それ以上の長さでは必ず居着くからである。",s:"①p.125"},en:{t:"The Length of One Breath",d:"An Okinawan kata, run at full speed, lasts exactly one breath—any longer and rooting is inevitable.",s:"① p.125"},r:["itsuki"]},
{id:"kata-master",c:"kata",ja:{t:"形の完全マスター",y:"かたのかんぜんマスター",d:"連続変化する立ち方が「ただ普通に歩く運足」に見えること。初級＝前傾、中級＝くの字、最後＝突っ立ったまま（＝本部朝基の境地）。",s:"①p.141-142"},en:{t:"Complete Mastery of Kata",d:"Mastery is reached when the continuously changing stances look like nothing but ordinary walking. Beginner: leaning forward. Intermediate: the bent く shape. Final: standing bolt upright—the stage of Motobu Choki.",s:"① pp.141-142"},r:["motobu","walking"]},
{id:"kata-shometsu",c:"kata",ja:{t:"形の消滅と技の総括",y:"かたのしょうめつ",d:"70種以上あった形の大部分は消滅した。手刀・正拳への技の総括（簡素化）を理解しないままの分解は「99％のこじつけ」になる、と新垣は指摘する。",s:"①p.118-121"},en:{t:"The Vanishing of Kata",d:"Of more than seventy kata, most have vanished. Bunkai attempted without understanding how techniques were consolidated into knife-hand and fore-fist is, Arakaki says, '99% forced interpretation'.",s:"① pp.118-121"},r:["kata-tsukaenai"]},
{id:"kata-kata2",c:"kata",ja:{t:"「形」と「型」",y:"かたとかた",d:"カタには、流動体としての「形」と鋳型としての「型」の二つの役割が明確に併存する。表記論争は、どのレベルを語るかの違いでしかない。",s:"②p.90-92"},en:{t:"Kata as Flow, Kata as Mold",d:"The word kata carries two coexisting roles: 形, the flowing form, and 型, the casting mold. The endless orthography debate is only a disagreement about which level one is discussing.",s:"② pp.90-92"},r:["kata-def"]},
{id:"kata-box",c:"kata",ja:{t:"形＝箱（無の場）の創出",y:"かたははこのそうしゅつ",d:"ナイファンチ立ちの移動はジグザグ＝「くの字」。首里手は右始まり、泊手は左始まりで、左右対称に重ねると＜＞連続のモザイク＝四角い箱の連続になる。形とは空間に箱を創出する行為である。",s:"③p.140-143"},en:{t:"Kata Creates the Box",d:"Movement in Naihanchi stance is a zigzag—the character く. Shuri-te begins to the right, Tomari-te to the left; overlay them symmetrically and a mosaic of nested angles emerges: a succession of square boxes. Kata is the act of creating boxes in space.",s:"③ pp.140-143"},r:["box-creation","naihanchi"]},
