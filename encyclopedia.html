{id:"tandoku-genkai",c:"kata",ja:{t:"単独形の可能性と限界",y:"たんどくがたのげんかい",d:"形が教えられるのは空間の創出まで。臨機応変や対人技量は、相対形・組手・実戦で学ぶ。本質を把握すれば、現象は千も万も作り出せる。",s:"③p.144-147"},en:{t:"The Reach and Limit of Solo Kata",d:"Kata can teach as far as the creation of space; adaptability and interpersonal skill are learned in paired kata, kumite, and combat. Grasp the essence, and a thousand—ten thousand—manifestations can be generated.",s:"③ pp.144-147"},r:["kata-box","one-third"]},
{id:"taninzu-hitei",c:"kata",ja:{t:"「形＝多人数との闘い」説の否定",y:"たにんずうせつのひてい",d:"形は一人の相手を完璧に打ち破るために存在する。多人数説は、指導者が素人に見せるための「方便」（くの字の真中に相手役を立たせた作為）が本義を喪失させたものである。",s:"③p.150-151"},en:{t:"Against the 'Multiple Opponents' Theory",d:"Kata exists to defeat one opponent perfectly. The multiple-opponents theory grew from a teaching expedient—posting demonstration partners at the angles of the zigzag for laymen's eyes—until the expedient devoured the meaning.",s:"③ pp.150-151"},r:["one-thought","kata-box"]},
{id:"sayu-taisho",c:"kata",ja:{t:"左右対称問題",y:"さゆうたいしょうもんだい",d:"古伝の形は、伝承が古いほど左右対称ではない。しかし左右対称の思想で演じる――その矛盾に自らの答えを模索し、口碑と一致するまで修行することこそが「稽古」である。",s:"③p.149-150"},en:{t:"The Symmetry Problem",d:"The older the transmission, the less symmetrical the kata—yet one performs it with the philosophy of symmetry. To seek one's own answer to that contradiction, training until it accords with the oral tradition: that is keiko.",s:"③ pp.149-150"},r:["hyakuren-jitoku"]},
{id:"oyo-kata",c:"kata",ja:{t:"応用形の存在理由",y:"おうようがたのそんざいりゆう",d:"ナイファンチで創出エネルギーを完璧に使える段階に達して初めて、他の形は「ある場面・ある状態で最大エネルギーを最小の動きで出すテスト実験場」になる。体術なしに学べば形踊りである。",s:"③p.108-112／p.134"},en:{t:"Why Application Kata Exist",d:"Only when Naihanchi's created energy can be used perfectly do the other kata become what they are: test laboratories for producing maximum energy with minimum motion in a given situation. Learned without the body art, they are kata-dancing.",s:"③ pp.108-112, 134"},r:["naihanchi","kata-sanbunrui"]},
{id:"yon-yoso",c:"kata",ja:{t:"形の四要素",y:"かたのよんようそ",d:"構造（Structure）・機能（Function）・様式（Style）・応用（Application）――この四つの混同こそが、現代空手の誤解の元凶である（⑤の最重要章）。構造＝ナイファンチ由来の削ぎ落とした結晶。機能＝業（ワザ）＝正中線の認識と操作。様式＝正中線・天地線を整え、暗喩で技を隠す。応用＝同じ業の変化（突き＝蹴り＝投げは全部同じ業）。",s:"⑤p.115-142（第10章）"},en:{t:"The Four Elements of Kata",d:"Structure, Function, Style, Application—the confusion of these four is the root of modern karate's misunderstandings (Vol. ⑤'s pivotal chapter). Structure: the pared-down crystal descended from Naihanchi. Function: the waza—recognition and operation of the centerline. Style: ordering the centerline and heaven-earth line while hiding techniques in metaphor. Application: variations of one same waza—punch, kick, and throw are all the same technique.",s:"⑤ pp.115-142 (ch. 10)"},r:["yoshiki-metaphor","kuden-15","naihanchi"]},
{id:"tandoku-shinsoku",c:"kata",ja:{t:"単独形＝神速を得る唯一の方法",y:"たんどくがたはしんそく",d:"相手がいない・的に当てない・反動もない――一見マイナスだらけの単独形だが、練習相手は365日一緒にいる自分自身である。マッスルメモリーが脳に最速回路を開設し、事前に動きを決めたほうが脳の処理は速い（考えながら動くと遅れる）。",s:"⑤p.104-114"},en:{t:"Solo Kata: The Only Road to Divine Speed",d:"No opponent, no target, no impact—solo kata looks all deficit, yet your training partner is yourself, present 365 days a year. Muscle memory opens the brain's fastest circuits, and pre-decided movement processes faster than improvised movement—think while moving and you arrive late.",s:"⑤ pp.104-114"},r:["setsuna","chokudo"]},
{id:"yoshiki-metaphor",c:"kata",ja:{t:"様式＝暗喩（メタファー）",y:"ようしきはあんゆ",d:"ナカユクイ（中休息）は呼吸を整えると同時に「相手を制御している」の暗喩。手刀を横に出す様式は喉輪（相手の喉仏をつかみきる技）の様式化。暗喩の意味がわかれば、平安の90％は即座に理解できる、と新垣は記す。",s:"⑤p.115-142／p.398-432"},en:{t:"Style as Metaphor",d:"The nakayukui pause both settles the breath and signals, metaphorically, 'the opponent is under control'. The sideways knife-hand is the stylization of the throat grip. Understand the metaphors, Arakaki writes, and ninety percent of the Pinan kata become instantly intelligible.",s:"⑤ pp.115-142, 398-432"},r:["yon-yoso","pinan-themes"]},
{id:"kishotenketsu",c:"kata",ja:{t:"形の起承転結",y:"きしょうてんけつ",d:"起＝つかまれる・殴られる／承＝受身の反応／転＝攻守逆転して反撃（転は複数ある）／結＝相手を封じて勝利。首里手の形は攻防交互ではなく、転じた後は自分の攻撃のみが連続する。",s:"⑤p.143-152"},en:{t:"The Four-Act Structure of Kata",d:"Ki: you are grabbed or struck. Sho: the defensive response. Ten: the reversal—attack and defense change hands (there are several ten). Ketsu: the opponent sealed, victory. Shuri-te kata does not alternate attack and defense: after the reversal, only your own attacks follow, unbroken.",s:"⑤ pp.143-152"},r:["uke-kogeki","yon-yoso"]},
{id:"timelag",c:"kata",ja:{t:"タイムラグ（技の凝縮）",y:"たいむらぐ",d:"本来AとBの別々の技を、形の中ではABとして凝縮して演じる。平安四段・五段の最後の裏拳はA（盆の窪への裏拳）＋B（交差立ちの投げ）であり、諸手裏拳はABCD四つの技の凝縮。簡素化された平安で学んだ世代が古伝の形まで簡素化して伝えたことが、古伝が難解になった理由である。",s:"⑤p.143-152／p.398-432"},en:{t:"Time-Lag: Compressed Techniques",d:"Techniques A and B, originally separate, are performed in kata compressed as AB. The final back-fist of Pinan 4 and 5 is A (back-fist to the nape) plus B (a throw from the cross-stance); the double back-fist compresses four techniques, ABCD. The generation raised on the simplified Pinan passed even the classical kata down simplified—which is why the old kata now read as riddles.",s:"⑤ pp.143-152, 398-432"},r:["yoshiki-metaphor","itosu"]},
{id:"pinan-themes",c:"kata",ja:{t:"平安各段の主題",y:"ぴんあんかくだんのしゅだい",d:"初段・四段＝上段攻撃・武器への反撃法。二段・三段・五段＝捕り手（組技）からの解脱――日本柔術を套路に組み込んで再構築したもの。二段の原型は幻の形チャンナン（本部流「白熊」がその証拠）。古式ナイファンチを糸洲が三分割して初段・二段・三段にした、というのが新垣の私見である。",s:"⑤p.13-22／p.153-161"},en:{t:"The Themes of the Five Pinan",d:"Pinan 1 and 4: counters to high attacks and weapons. Pinan 2, 3, and 5: escapes from grappling—Japanese jujutsu rebuilt into the routine. The prototype of Pinan 2 is the phantom kata Channan (Motobu-ryu's 'Shirokuma' is the evidence). That Itosu divided the old-style Naihanchi into its three parts is Arakaki's personal conjecture.",s:"⑤ pp.13-22, 153-161"},r:["itosu","pinan-godan","timelag"]},
{id:"pinan-godan",c:"kata",ja:{t:"平安五段＝糸洲の作ではない？（説）",y:"ぴんあんごだん",d:"五段だけ、首里手の法則違反が多発する（最初の反撃が中段／決定打が奇数の三歩目／歩数が半歩合わず元の位置に戻れない）。ここから「糸洲安恒が作った、あるいは完成させた形ではないのではないか」というのが新垣の感触であり（同旨の証言もあるが確証はない）、断定はされていない。",s:"⑤p.398-432"},en:{t:"Pinan 5: Not Itosu's Work? (A Theory)",d:"Pinan 5 alone violates the laws of Shuri-te repeatedly: the first counter is middle-level, the decisive blow falls on an odd third step, and the step count is half a stride short of returning to start. From this Arakaki senses—supported by testimony but without proof, and stated only as conjecture—that it may not be a kata Itosu created or completed.",s:"⑤ pp.398-432"},r:["pinan-themes","itosu","kuden-15"]},
{id:"kuden-15",c:"kata",ja:{t:"首里手の口伝15",y:"しゅりてのくでんじゅうご",d:"その1＝首里は左から／2＝形は元の位置に戻る（自己診断法）／3＝力はクシから／4＝呼吸は自然に／5＝歩み足／6＝突きは手が先（脱力は存在しない）／7＝逆突きはない／8＝身体を固めるな／9＝三歩は一歩（偶数＝死に体）／10＝同じ動作は三歩まで／11＝二歩で極める／12＝二歩は投げ／13＝転身は投げ／14＝交差は投げ／15＝つかんだら蹴れ、つかまれたら蹴れ。口伝3〜8は力学的エネルギーの法則を身体で具現化する手引き、9〜15は形の中の動作の意味である。",s:"⑤p.178-216"},en:{t:"The Fifteen Oral Teachings of Shuri-te",d:"1: Shuri begins from the left. 2: The kata returns to its starting point (a self-diagnostic). 3: Power comes from the kushi. 4: Breathe naturally. 5: Walking step. 6: The hand leads the punch—there is no going-limp. 7: There is no reverse punch. 8: Do not stiffen the body. 9: Three steps are one (even numbers are dead body). 10: The same motion at most three times. 11: Finish in two steps. 12: Two steps mean a throw. 13: A turn is a throw. 14: A cross is a throw. 15: If you grab, kick; if grabbed, kick. Teachings 3–8 embody the law of mechanical energy in the flesh; 9–15 give the meaning of the movements within the kata.",s:"⑤ pp.178-216"},r:["kushi","no-gyakuzuki","yon-yoso"]},
{id:"gendai-kuden",c:"kata",ja:{t:"現代の口伝",y:"げんだいのくでん",d:"演武線は一直線／演武線と正中線の一致／相手は単独で同一人物／身体が武器を隠し、武器が身体を隠す（引き手＝腕の長さを消す）／突きに双手はない・受けに双手はない（両手が同時に届く距離は存在しない――正体は投げと突き上げ）／受けてから攻撃では遅い（基準＝刹那1/75秒）。",s:"⑤p.217-245"},en:{t:"The Modern Oral Teachings",d:"The embusen is one straight line. Embusen and centerline coincide. The opponent is single and the same person throughout. The body hides the weapon and the weapon hides the body (the chambered hand erases the arm's length). There are no two-handed punches and no two-handed blocks—no distance exists at which both hands land at once; their true identity is throw and uppercut. Block-then-attack is too late: the standard is the setsuna, one seventy-fifth of a second.",s:"⑤ pp.217-245"},r:["kuden-15","true-embusen","setsuna"]},
{id:"kime-hitei",c:"kata",ja:{t:"極めの否定",y:"きめのひてい",d:"沖縄空手に、現在の意味での「極め」は存在しない。力学的エネルギーを急所へ刹那に放出するだけであり、極めのポーズは居着き＝形骸である。前屈立ちで地面を押すのは「押し」であって「突き」ではない。",s:"⑤p.202-205"},en:{t:"The Denial of Kime",d:"Okinawan karate has no kime in the modern sense: mechanical energy is simply discharged into a vital point within the setsuna. The kime pose is rootedness—an empty husk. Pressing off the ground in a forward stance is a push, not a punch.",s:"⑤ pp.202-205"},r:["itsuki","mech-energy"]},
{id:"koshi-nage-nai",c:"kata",ja:{t:"腰に乗せる投げは無い",y:"こしにのせるなげはない",d:"古来の日本武道に、相手を腰に乗せる投げは存在しない。乗せた瞬間に居着いて死に体になるうえ、相手は刃物を持っている前提だからである。",s:"⑤p.202-205／p.366-397"},en:{t:"No Hip Throws",d:"Classical Japanese budo has no throw that loads the opponent onto the hip: the instant of loading is rooted, dead body—and the opponent is presumed to carry a blade.",s:"⑤ pp.202-205, 366-397"},r:["itsuki","kuden-15"]},
{id:"uke-kogeki",c:"kata",ja:{t:"受け＝攻撃",y:"うけはこうげき",d:"「空手は受けから始まる＝平和の武術」という説明は倫理的な粉飾であり、真相は「攻撃で終わると形が成立しない」という構造上の都合である。平安の上段必殺技は、学校教育の中で中段へ薄められた。",s:"⑤p.162-177"},en:{t:"The Block Is an Attack",d:"'Karate begins with a block, therefore it is an art of peace' is ethical window-dressing; the structural truth is that a kata cannot end on an attack. The lethal high-level techniques of the Pinan were watered down to middle level for the schools.",s:"⑤ pp.162-177"},r:["kishotenketsu","itosu"]},
{id:"ochiru-uku",c:"kata",ja:{t:"落ちる＝浮く＝同じ業",y:"おちるとうく",d:"重力落下で「落ちる」身体操作と、膝を抜いて空中へ「浮く（飛ぶ）」動作は、同じ身体機能の違った現象であり、業としては同じものである。",s:"⑤p.398-432"},en:{t:"Falling and Floating: One Same Waza",d:"Dropping with gravity and rising weightless into the air by knee release are different phenomena of one same bodily function—one and the same waza.",s:"⑤ pp.398-432"},r:["knee-release","uku"]},
{id:"tatami-sanjo",c:"kata",ja:{t:"形は畳三畳",y:"かたはたたみさんじょう",d:"平安の形は畳三畳におさまる。それは人間が身を守れる空間の閾である。歩幅の大きい人に名人はいない。",s:"⑤p.339-365"},en:{t:"Kata Fits on Three Tatami",d:"A Pinan kata fits within three tatami mats—the threshold of space within which a human can defend himself. There are no masters with long strides.",s:"⑤ pp.339-365"},r:["iki","distance-short"]},
{id:"true-embusen",c:"kata",ja:{t:"真の演武線",y:"しんのえんぶせん",d:"演武線とは歩数や方向のことではなく、自分と（仮想の）相手との正中線の一致こそが古伝の形における演武線の存在理由である（③で「自分と相手の正中線を結ぶ線」として提示され、④で山根流棒術・大城利弘師範の卓越した意見として結実）。首里手の形は「合撃」を前後・左右・上下のすべてに行うことを仮定とし、四次元さえ包括して一直線に延々と伸びていく。",s:"③p.151-152／④p.120-123"},en:{t:"The True Embusen",d:"The embusen is not a matter of step counts or directions: the raison d'être of the classical kata's performance line is the coincidence of one's own centerline with that of the (virtual) opponent—presented in Vol. ③ and crystallized in Vol. ④ through the remarkable insight of Oshiro Toshihiro of Yamane-ryu bojutsu. The Shuri-te kata presupposes gasshi in every direction—fore-aft, left-right, up-down—and stretches on as one straight line embracing even the fourth dimension.",s:"③ pp.151-152; ④ pp.120-123"},r:["centerline-match","gasshi","oshiro"]},
{id:"naihanchi-hogejaku",c:"kata",ja:{t:"ナイファンチ＝放下著",y:"ほうげじゃく",d:"ナイファンチの真の目的は、禅の「放下著」――己の存在さえ否定する相互否定である（他の形＝禅語の「担取し去る」）。単独形でありながら「自分と仮想の相手の正中線の常時一致」を命じる――相対形の合撃と同じ思想を、最も困難な方法で修行させる形である。",s:"④p.121-122"},en:{t:"Naihanchi as Hogejaku",d:"Naihanchi's true purpose is Zen's hogejaku—'cast it all down', the mutual negation that denies even one's own existence (the other kata correspond to 'take it up and carry on'). Though performed alone, it commands the perpetual coincidence of one's centerline with a virtual opponent's: the same thought as paired gasshi, trained by the most difficult method of all.",s:"④ pp.121-122"},r:["naihanchi","tanjunka","gasshi"]},
{id:"naihanchi-only",c:"kata",ja:{t:"ナイファンチだけが正しい姿勢",y:"ないふぁんちだけが",d:"純粋に武道的に正しい姿勢はナイファンチ以外になく、他の立ち方はその変形あるいは途上のものでしかない――「ならばナイファンチ立ち一つで良いではないか？！」。現行の前屈立ち・猫足立ちは古伝に存在しない（身体が拒否する）、と④は記す。",s:"④p.85-88／p.176-177"},en:{t:"Naihanchi: The One Correct Posture",d:"There is no martially correct posture other than Naihanchi; every other stance is its variant or a station on the way—'then is not Naihanchi stance alone enough?!' The modern front stance and cat stance, Vol. ④ records, did not exist in the classical art—the body refuses them.",s:"④ pp.85-88, 176-177"},r:["naihanchi-dachi","tachikata-nai"]},
{id:"kata-tsukaenai",c:"kata",ja:{t:"「形を使えない」だけ",y:"かたをつかえないだけ",d:"古伝の形は、「真の演武線」の存在と活用を理解しなければ技のカタログにしかならない。「使えない形」なのではなく、修行者が「形を使えない」だけである。形の分解が使えない業のオンパレードになる理由もここにある。",s:"④p.122-123"},en:{t:"It Is You Who Cannot Use the Kata",d:"Without understanding the true embusen, a classical kata is a mere catalogue of techniques. It is not that the kata is unusable—it is the practitioner who cannot use it. Hence the parade of unusable techniques that passes for bunkai.",s:"④ pp.122-123"},r:["true-embusen","kata-shometsu","keigaika"]},
{id:"keigaika",c:"kata",ja:{t:"形骸化の警告",y:"けいがいかのけいこく",d:"古伝最大の問題は、検証を忘却し、文字どおり「重心移動が無い」「パワーに欠ける」業になったこと＝先達の遺産の食い潰しである。事実は、古伝ほど重心移動が過激で巧妙な操作は世界でも稀。形が違うのではない――修行者の程度で、形の演じ方・使い方が違ってくるのである。",s:"④p.153-154"},en:{t:"The Warning Against Fossilization",d:"The classical art's greatest crisis: verification forgotten, its techniques have literally become 'without weight shift' and 'lacking power'—the squandering of the forebears' estate. In fact, few systems on earth shift weight as radically and cunningly as the classical kata. The kata does not differ—the practitioner's level changes how the kata is performed and used.",s:"④ pp.153-154"},r:["kata-tsukaenai","hyakuren-jitoku"]},
/* ---- History Examined ---- */
{id:"hist-ti",c:"hist",ja:{t:"「手（ティー）」の正体＝日本剣術",y:"てぃーのしょうたい",d:"空手は「中国拳法＋沖縄固有の手」と語られてきたが、「手」の正体は土着化した日本剣術を主体とした日本武術のことである――これが⑥の中心テーゼ。「チ（手）」は日本古語で戦いの技術を指し（「チカラ」＝手＋幹）、沖縄土着のまぼろしの格闘技ではない、と新垣は論じる。",s:"⑥まえがき／p.357-359"},en:{t:"The True Identity of 'Ti': Japanese Swordsmanship",d:"Karate has been told as 'Chinese boxing plus an indigenous Okinawan art called ti'—but the central thesis of Vol. ⑥ is that ti was in fact Japanese martial art, chiefly naturalized Japanese swordsmanship. 'Chi (ti)' is archaic Japanese for the skill of combat (chikara = ti + trunk); it was never a phantom native fighting art, Arakaki argues.",s:"⑥ preface; pp.357-359"},r:["matsumura","hist-sanshu","yabu"]},
{id:"hist-two-reforms",c:"hist",ja:{t:"空手は二度変革された",y:"にどへんかくされた",d:"①明治以後、日本社会への融合のために意図された変革。②王国崩壊後、心身思想の欠落によって起きた無意識の変革。現代の空手は、琉球王国時代の武術と心身思想がまるで異なるものになっている、と新垣は指摘する。",s:"⑥まえがき"},en:{t:"Karate Was Transformed Twice",d:"First: a deliberate transformation after Meiji, to merge into Japanese society. Second: an unconscious transformation after the kingdom's fall, as the mind-body philosophy drained away. Today's karate, Arakaki holds, differs utterly from the martial art and philosophy of the Ryukyu Kingdom era.",s:"⑥ preface"},r:["hist-ti","hist-itosu-koza"]},
{id:"hist-kinbu",c:"hist",ja:{t:"禁武政策の実像＝帯刀の禁止",y:"きんぶせいさく",d:"薩摩の「禁武政策」は武術の禁止ではなく帯刀の禁止であり、屋敷内の修行は自由だった。「兵具改」も武器の没収ではなく管理である。蔡温『独物語』は、薩摩体制下でも武術修行が「奉公節義の勤め」として続いていた証拠であり、薩摩侵攻以前の沖縄の武士は日本刀を差して闊歩していた。",s:"⑥第11-12章"},en:{t:"The 'Weapons Ban' Reconsidered",d:"Satsuma's famous prohibition banned the wearing of swords, not the practice of martial arts—training within one's walls was free, and the 'weapons inspection' was registration, not confiscation. Sai On's Dokumonogatari attests that training continued as a duty of loyal service; before the Satsuma invasion, Okinawan bushi walked the streets wearing Japanese swords.",s:"⑥ chs. 11-12"},r:["sai-on","hist-ti"]},
{id:"hist-sanshu",c:"hist",ja:{t:"首里手・泊手・那覇手の区分は誤解",y:"さんしゅくぶん",d:"王国時代に、三つの峻別された流派は存在しない。支配者階級の身体文化の基礎は日本剣術で首里・泊・那覇に共通しており（泊手も首里手も「沖縄手」）、三手の区分は明治期に始まったものである、と新垣は論じる。",s:"⑥第22-23章"},en:{t:"Shuri-te, Tomari-te, Naha-te: A Misread Division",d:"No three sharply divided schools existed in the kingdom era. The ruling class shared one bodily foundation—Japanese swordsmanship—across Shuri, Tomari, and Naha (Tomari-te and Shuri-te alike being 'Okinawa-te'); the threefold division began in the Meiji period, Arakaki argues.",s:"⑥ chs. 22-23"},r:["hist-ti","hist-koryu-nahate"]},
{id:"hist-doseki",c:"hist",ja:{t:"怒責作用（息吹）は宮城長順以後",y:"どせきさよう",d:"王国時代の武術に怒責作用（息吹）は存在しない――呼吸は隠す・自然に、が原則だった（多和田真淳の証言とも一致）。東恩納寛量の高弟・宮城長順が1915年以降に中国から導入し、サンチンの呼吸法を変えた、と新垣は考証する。",s:"⑥p.319-321"},en:{t:"Forced Breathing Came After Miyagi",d:"The kingdom-era art had no ibuki, no forced breathing—breath was hidden and natural (in accord with Tawada Shinjun's testimony). It was Miyagi Chojun, Higaonna's senior disciple, who introduced it from China after 1915 and changed Sanchin's breathing, Arakaki finds.",s:"⑥ pp.319-321"},r:["miyagi","higaonna","kuden-15"]},
{id:"hist-koryu-nahate",c:"hist",ja:{t:"古流那覇手は消滅した",y:"こりゅうなはて",d:"現在の「那覇手」は、王国崩壊後に東恩納寛量が持ち帰り宮城長順が創始した新興那覇手であり、王国時代の「那覇の手」とは心身思想が正反対である。古流那覇手は同類の「首里の手」に吸収される形で消滅した――剛柔流は古流那覇手の後継ではない、と新垣は結論づける。",s:"⑥p.322-325"},en:{t:"Old Naha-te Is Extinct",d:"Today's 'Naha-te' is a new school: brought back by Higaonna Kanryo after the kingdom's fall and founded by Miyagi Chojun—its mind-body philosophy the very opposite of the kingdom-era 'te of Naha'. The old Naha-te was absorbed into its kindred Shuri-te and vanished; Goju-ryu, Arakaki concludes, is not its successor.",s:"⑥ pp.322-325"},r:["higaonna","miyagi","hist-sanshu"]},
{id:"hist-boshu",c:"hist",ja:{t:"戊戌の御冠船（1838）＝現代空手の源流",y:"ぼじゅつのおかんせん",d:"沖縄空手史にとって最重要なのは、有名な1866年「寅の御冠船」ではなく1838年「戊戌の御冠船」の武官たちである（ナイファンチ・パッサイはここからか、と新垣は推察する）。宮城長順の記した「文政一一年の交（1828）」も1838の誤りとみられ（十干「戊」と十二支「戌」の混同）、剛柔流の源流も戊戌の御冠船に行き着く。",s:"⑥第24章"},en:{t:"The 1838 Crown Ship: Wellspring of Modern Karate",d:"The pivotal event was not the famous 1866 crown-ship embassy but the military officers of the 1838 embassy—from whom, Arakaki surmises, Naihanchi and Passai may descend. Miyagi Chojun's date 'around 1828' appears to be an error for 1838 (a confusion of the sexagenary characters), tracing even Goju-ryu's source to the 1838 ship.",s:"⑥ ch. 24"},r:["miyagi","naihanchi","hist-denshiyo"]},
{id:"hist-itosu-koza",c:"hist",ja:{t:"糸洲の功罪",y:"いとすのこうざい",d:"糸洲安恒がいなければ空手は現代に残っていない（大乗化に目覚めた最初の人間）。しかし糸洲の手は首里手四割・那覇手六割であり、ナイファンチの静歩行化（東恩納の影響大）・平安の創作・技の簡素化によって武術としての牙を抜いた。「糸洲のナイファンチ」は、泊の清国人から習った原の形とは別物である（糸洲本人の証言あり）。",s:"⑥p.330-337／第26章"},en:{t:"Itosu: The Debt and the Cost",d:"Without Itosu Anko, karate would not have survived—he was the first to awaken to its popularization. Yet his art was four parts Shuri-te to six parts Naha-te; by making Naihanchi static-stepped (under Higaonna's strong influence), creating the Pinan, and simplifying techniques, he drew the art's fangs. 'Itosu's Naihanchi', by his own testimony, differed from the original form he learned from a Chinese in Tomari.",s:"⑥ pp.330-337; ch. 26"},r:["itosu","hist-dynamic-walk","pinan-themes"]},
{id:"hist-yabu-last",c:"hist",ja:{t:"首里の手の消滅（1937）",y:"しゅりのてのしょうめつ",d:"日本剣術の心身思想で中国武術を解体・再構築できた最後の人間が屋部憲通であり、1937年の屋部の死去によって首里の手（沖縄の手）は消滅したとしてよい、と新垣は記す。次世代には日本武術の思想背景を得る環境が失われていた――歴史の必然である。",s:"⑥p.371-377"},en:{t:"The Extinction of Shuri-te (1937)",d:"Yabu Kentsu was the last man able to dismantle and rebuild Chinese boxing upon the mind-body philosophy of Japanese swordsmanship; with his death in 1937, Arakaki writes, the te of Shuri—the te of Okinawa—may be said to have ended. The next generation had lost the environment in which that philosophical grounding could be acquired: history's necessity.",s:"⑥ pp.371-377"},r:["yabu","hist-ti"]},
{id:"hist-denshiyo",c:"hist",ja:{t:"伝承の持続性の欠如",y:"でんしょうのじぞくせい",d:"冊封使の武官から学んだ中国拳法は、道場という社会制度が無かったため三代、四代までは続かない。首里手が続いたのは、松村宗昆→糸洲という僥倖である。",s:"⑥p.350-352"},en:{t:"Why Transmissions Died Out",d:"Chinese boxing learned from embassy officers rarely survived three or four generations—there was no dojo, no social institution to carry it. That Shuri-te endured was the good fortune of the chain Matsumura to Itosu.",s:"⑥ pp.350-352"},r:["matsumura","itosu","hist-boshu"]},
{id:"hist-funakoshi-motobu",c:"hist",ja:{t:"船越と本部＝空手の両輪",y:"ふなこしともとぶ",d:"船越義珍（教育・普及）と本部朝基（実戦性の証明）が時期を同じくして東京と大阪に別れたのは、偶然ではなく歴史の要請である。松村（創作）→糸洲（教育体系化）→船越（本土移入）＋本部（実戦証明）――時代の節目ごとに適役が現れた。",s:"⑥結び"},en:{t:"Funakoshi and Motobu: The Two Wheels",d:"That Funakoshi Gichin (education and diffusion) and Motobu Choki (proof of combat worth) settled in Tokyo and Osaka in the same era was no accident but history's requisition: Matsumura the creator, Itosu the systematizer, Funakoshi the transplanter, Motobu the prover—the right man at every turning.",s:"⑥ conclusion"},r:["funakoshi","motobu"]},
{id:"muchimi-etymology",c:"hist",ja:{t:"ムチミの語源＝餅身",y:"むちみのごげん",d:"mochiのo音→u音への変化による、完全な日本語である。「餅のように粘る身体操作」が原義であり、本土で「鞭」と漢字表記されたために「身体を鞭のように振る」という誤解が生じた。首里の手に腰をふる・まわす動作はない――「首里の手は、手が先である」（④の解剖学と完全に一致する語源学的証明）。",s:"⑥p.368-369"},en:{t:"The Etymology of Muchimi: Mochi-Body",d:"A fully Japanese word, formed by the o-to-u vowel shift from mochi: its original sense is 'body movement sticky as rice cake'. When the mainland wrote it with the character for 'whip', the misreading 'swing the body like a whip' was born. The te of Shuri has no hip swing or rotation—'in Shuri-te, the hand leads'—an etymological proof matching Vol. ④'s anatomy exactly.",s:"⑥ pp.368-369"},r:["muchimi","hist-ateji","kuden-15"]},
{id:"gamaku-etymology",c:"hist",ja:{t:"ガマクの語源と又吉論文",y:"がまくのごげん",d:"沖縄県立芸術大学・又吉靜江教授の論文が、ガマク＝腰方形筋（位置エネルギー→運動エネルギー変換で力学的エネルギーを増加させる際に使う筋）と特定している。御冠船踊りの名人・金武良仁が弟子に「ガマクとは何か？」と尋ねた逸話から、王朝時代の上流社会に「ガマク」という言葉は存在しなかった可能性（雑踊り起源説）を新垣は指摘する。",s:"⑥p.369-370"},en:{t:"The Etymology of Gamaku",d:"A paper by Prof. Matayoshi Shizue of the Okinawa Prefectural University of Arts identifies gamaku as the quadratus lumborum—the muscle used to convert potential into kinetic energy. From the anecdote of the great court dancer Kin Ryojin asking his own students 'what is this gamaku?', Arakaki suggests the word may not have existed in high society in the kingdom era, originating instead in the popular zo-odori dance.",s:"⑥ pp.369-370"},r:["gamaku","quadratus","kin-ryojin"]},
{id:"chinkuchi-etymology",c:"hist",ja:{t:"チンクチ＝地根力説",y:"ちんくちのごげん",d:"現在は「一寸力」の字が当てられるが、本来は中国語「地根力」（鶴拳の用語）の沖縄なまりのはず、と新垣は推察する。白鶴拳の呉賢貴（1886-1940）が鶴拳を指導した時の言葉が元ではないか――つまりチンクチは首里手古来の用語ではない可能性がある。",s:"⑥p.370"},en:{t:"Chinkuchi as 'Root Power': A Theory",d:"Now written 'one-sun power', the word, Arakaki surmises, is an Okinawan rendering of the Chinese digenli—'ground-root power', a White Crane term—likely from the teaching of Go Kenki (Wu Xiangui, 1886-1940). If so, chinkuchi may not be an ancient Shuri-te term at all.",s:"⑥ p.370"},r:["chinkuchi","go-kenki"]},
{id:"language-limit",c:"hist",ja:{t:"言語の限界と居着き",y:"げんごのげんかい",d:"首里手の形の漢字表記が失伝しているのは、沖縄の武術家が言語の限界を認知していたことに由来する。「言語で説明する事柄は、言語で説明できるもの以下にはならない」「とどまる＝居着く＝敗退」。アリストテレスの言葉を借りれば――流動するものにこそ真実は宿る。",s:"⑥p.361-364"},en:{t:"The Limits of Language",d:"That the kanji for the Shuri kata were never handed down stems from the Okinawan masters' awareness of language's limits: 'what is explained in words never rises above what words can explain'; 'to halt is to root is to lose'. In Aristotle's phrase—truth dwells in what flows.",s:"⑥ pp.361-364"},r:["meishika","culture-itsuki","budo-science"]},
{id:"hist-naihanchi-n",c:"hist",ja:{t:"ナイファンチに「ン」は無い",y:"ないふぁんちにんはない",d:"古語日本語の語尾音に「ン」の字は存在しない（いろは歌47文字に「ん」は無い）。「ナイファンチ」と「ナイファンチン」の揺れは、日本語化（沖縄語化）された発音と、中国語に近づけた表記の並存である。",s:"⑥p.357-360"},en:{t:"No 'N' at the End of Naihanchi",d:"Archaic Japanese had no final 'n'—the 47 letters of the Iroha contain none. The wavering between 'Naihanchi' and 'Naihanchin' is the coexistence of a Japanized (Okinawanized) pronunciation with a spelling drawn back toward Chinese.",s:"⑥ pp.357-360"},r:["naihanchi","hist-ateji"]},
{id:"hist-ateji",c:"hist",ja:{t:"勇ましい当て字の罠",y:"あてじのわな",d:"「当法（アテファー）」は軍国主義期に「当破」へ変わり、「鉄騎」は“鉄の馬の膠着姿勢”という誤解を英語圏（iron horse）にまで広めた。「抜塞」「鎮東」など、漢字表記を文字どおりに受け取る致命的な間違いを近代空手は犯した、と新垣は指摘する。",s:"⑥p.365-368"},en:{t:"The Trap of Heroic Kanji",d:"'Atefa' was rewritten in the militarist era as 'strike-and-destroy'; 'Tekki' (iron horseman) exported the 'iron horse stance' misunderstanding into English. Passai, Chinto—modern karate, Arakaki notes, made the fatal error of taking ornamental kanji at face value.",s:"⑥ pp.365-368"},r:["muchimi-etymology","hist-naihanchi-n"]},
{id:"hist-hiki",c:"hist",ja:{t:"ヒキ＝琉球王国の軍事組織",y:"ひき",d:"琉球王国も自主独立国として、軍と常備システム（ヒキ）を保持していた。空手という「個の武術」の発達には、戦士たちの存在が不可欠だった。",s:"⑥まえがき／第8-9章"},en:{t:"The Hiki: The Kingdom's Military",d:"The Ryukyu Kingdom, as a sovereign state, maintained an army and standing system called the hiki. The development of karate—an art of the individual—was impossible without the existence of warriors.",s:"⑥ preface; chs. 8-9"},r:["hist-1609","hist-kinbu"]},
{id:"hist-1609",c:"hist",ja:{t:"1609年の敗因＝ソフトウェア",y:"いちろくれいきゅう",d:"薩摩侵攻の敗北は、ハードウェア（鉄砲1000丁）以前に、火縄銃の威力への認識が皆無だったこと（ソフトウェアの欠如）にある。武器は、その質量に加えて使用方法・威力・防御方法の熟知が不可欠である。",s:"⑥第10章"},en:{t:"1609: A Defeat of Software",d:"The loss to Satsuma's invasion was decided less by hardware—a thousand muskets—than by the total absence of any grasp of what the matchlock could do: a failure of software. A weapon demands mastery of its use, its power, and its counters, not merely its possession.",s:"⑥ ch. 10"},r:["hist-hiki","bu-gorisei"]},
{id:"hist-gakko",c:"hist",ja:{t:"学校空手の形式の起源",y:"がっこうからての",d:"現在の準備運動・集団形演武・約束組手・整理運動・礼法は、陸軍の指導教官だった屋部憲通・花城長茂が持ち込んだものである。",s:"⑥p.379-380"},en:{t:"Where School Karate's Format Came From",d:"Today's warm-ups, group kata performance, pre-arranged sparring, cool-downs, and etiquette were introduced by Yabu Kentsu and Hanashiro Chomo—both former army drill instructors.",s:"⑥ pp.379-380"},r:["yabu","hanashiro"]},
{id:"hist-dynamic-walk",c:"hist",ja:{t:"首里手の基本＝動歩行（歴史的証明）",y:"どうほこう",d:"首里手の基本は動歩行（倒れ込む歩き）であり、鶴拳の姑娘歩（静歩行）とは正反対である――⑥第15章による歴史的証明。糸洲のナイファンチ静歩行化が「変革」であったことの傍証となる。",s:"⑥第15章"},en:{t:"Shuri-te Walks Dynamically: The Historical Proof",d:"The foundation of Shuri-te is dynamic walking—falling forward—the exact opposite of White Crane's static maiden step: the historical demonstration of Vol. ⑥, ch. 15, and corroboration that Itosu's static-stepped Naihanchi was a transformation.",s:"⑥ ch. 15"},r:["four-walks","hist-itosu-koza"]},
/* ---- People (1/2): the Okinawan lineage ---- */
{id:"arakaki",c:"people",ja:{t:"新垣 清",y:"あらかき きよし",d:"国際沖縄空手道無想会 会長。沖縄に生まれ、幼少より空手に親しむ。競技化の中で失われていった古伝沖縄空手の身体操作と心身思想を、解剖学・物理学・歴史学の視点から研究・体系化し、無想会を創設。その成果である著作全六巻（『沖縄武道空手の極意』全四巻・『平安の形の検証』・『琉球王国時代の武の検証』）は本辞典の典拠であり、国内外でセミナーを開催して直接指導を続けている。青年期にはインドでマザー・テレサのもと「死にいく者たち」を看取った経験を持つ（④あとがき）。",s:"著作全六巻"},en:{t:"Kiyoshi Arakaki",d:"President of the International Okinawan Karate-do Muso-kai. Born in Okinawa and raised in karate from childhood, he researched and systematized the body mechanics and mind-body philosophy of classical Okinawan karate—lost in the age of competition—through anatomy, physics, and history, founding the Muso-kai. His six volumes, the sources of this encyclopedia, are taught directly in seminars across Japan and abroad. As a young man he tended the dying under Mother Teresa in India (Vol. ④, afterword).",s:"The six volumes"},r:["muso","kaimei-shimei","shitataka"]},
{id:"matsumura",c:"people",ja:{t:"松村宗昆",y:"まつむら そうこん",d:"（1809-1899）首里手の事実上の創始者。薩摩のお家流・示現流の達人（雲耀の位）であり、「武士は神速を尊ぶ」を体現した。巻藁は示現流「立ち木打ち」由来とみられる（ただし松村個人の流入説には新垣は懐疑的）。クーシャンクーを「左右左」に改変し、黒船・開国の国難の時代に首里手を再構築した。夜の外出には鎌をしのばせたという。",s:"⑤p.23-32／⑥第12-17章"},en:{t:"Matsumura Sokon",d:"(1809-1899) The de facto founder of Shuri-te, and a master of Satsuma's own Jigen-ryu swordsmanship (holder of the un'yo rank), embodying 'the bushi prizes divine speed'. The makiwara appears to derive from Jigen-ryu's standing-tree striking (though Arakaki doubts Matsumura alone imported it). He recast Kusanku 'left-right-left' and rebuilt Shuri-te in the crisis years of the Black Ships. On night errands, it is said, he carried a sickle in his clothes.",s:"⑤ pp.23-32; ⑥ chs. 12-17"},r:["hist-ti","hist-denshiyo","itosu"]},
{id:"itosu",c:"people",ja:{t:"糸洲安恒",y:"いとす あんこう",d:"（1831-1915）空手の学校教育化＝大乗化に目覚めた最初の人間であり、彼がいなければ空手は現代に残っていない。若い頃は松村と折りあわず久米系の長濱に師事し、遺言で松村門下へ復帰。その手は首里手四割・那覇手六割で、ナイファンチの静歩行化・平安の創作・技の簡素化という「功罪」を残した。ナイファンチ立ちで日常を歩いた逸話の真意は、360度どこへでも滑れる仮想の重心にある。当法（アティファー）の双璧の一人。",s:"①p.90, p.116-118／⑤p.23-32／⑥p.330-337"},en:{t:"Itosu Anko",d:"(1831-1915) The first man to awaken to karate's popularization through the schools—without him it would not have survived. Estranged from Matsumura in youth, he studied under Nagahama of the Kume line, returning to Matsumura's door by his teacher's dying wish. His art was four parts Shuri to six parts Naha; his legacy—static Naihanchi, the Pinan kata, simplified technique—is both debt and cost. The tale of his walking daily life in Naihanchi stance points to a virtual center that could glide in any of 360 directions. One of the two great masters of atifa, the striking art.",s:"① pp.90, 116-118; ⑤ pp.23-32; ⑥ pp.330-337"},r:["hist-itosu-koza","pinan-themes","matsumura","yabu"]},
{id:"yabu",c:"people",ja:{t:"屋部憲通",y:"やぶ けんつう",d:"（1866-1937）「屋部軍曹」。糸洲門下三羽烏の筆頭。日清戦争で片手軍刀術の白兵戦を戦い、沖縄初の武功賞を受けた。「平安をやるくらいなら古伝クーシャンクーをやれ」と言い、自身はナイファンチのみを修行した。1927年にはハワイで米国初の空手演武を行い、「アメリカで最初に空手の種をまいた」。新垣が「首里の手の最後の伝承者」と位置づける人物。",s:"⑤p.23-32／⑥p.372-377"},en:{t:"Yabu Kentsu",d:"(1866-1937) 'Sergeant Yabu', foremost of Itosu's three great students. He fought hand-to-hand with the single-handed saber in the Sino-Japanese War—Okinawa's first decoration for valor. 'Rather than the Pinan, do the old Kusanku,' he said, training himself in Naihanchi alone. In 1927 he gave America's first karate demonstrations in Hawaii, 'planting the first seeds of karate in the United States'. For Arakaki, the last inheritor of the te of Shuri.",s:"⑤ pp.23-32; ⑥ pp.372-377"},r:["hist-yabu-last","hist-gakko","itosu"]},
{id:"hanashiro",c:"people",ja:{t:"花城長茂",y:"はなしろ ちょうも",d:"（1869-1945）糸洲門下三羽烏の一人。『空手組手』（1905）で「唐手」の字を「空手」に変えた記念碑的文献を残し、「組手」の字も最初に公に採用した名付け親。鹿児島連隊の教官を務めた。『空手道大観』の蹴り写真は倒地法の蹴りの貴重な記録であり、その拳は「素人握りに見える最速の握り」だった。沖縄戦直後、羽地村の避難民収容所で死去（75歳）。",s:"②p.69-70, p.105-106／⑥p.378-380"},en:{t:"Hanashiro Chomo",d:"(1869-1945) One of Itosu's three great students. His Karate Kumite (1905) is the monument that first wrote 'karate' with the character for 'empty'—and first publicly adopted the word kumite. A drill instructor with the Kagoshima regiment, he left in the Karate-do Taikan photographs a precious record of the falling-tree kick; his fist was 'the fastest grip, which looks like an amateur's'. He died at 75 in a refugee camp at Haneji, just after the Battle of Okinawa.",s:"② pp.69-70, 105-106; ⑥ pp.378-380"},r:["hist-gakko","tochiho","yabu"]},
{id:"kyan",c:"people",ja:{t:"喜屋武朝徳",y:"きゃん ちょうとく",d:"（1870-1945）「喜屋武ミーグヮー」。父・朝扶は王国最後の親方（うぇーかた）。読谷の鄙で指導したため新興那覇手の影響が皆無で、沖縄手の本流に近い手を伝えた。北谷屋良のクーシャンクーを受け継ぐ。父が身体を固めるのが得意だったことが、ナイファンチではなくセイサンを基本にした理由か、と新垣は推察する。石川の捕虜収容所で栄養失調のため死去。",s:"⑥p.381-383"},en:{t:"Kyan Chotoku",d:"(1870-1945) 'Kyan Migwa', son of one of the kingdom's last ueekata lords. Teaching in rural Yomitan, untouched by the new Naha-te, he transmitted a te close to the Okinawan mainstream, inheriting the Chatan Yara Kusanku. That his father excelled at hardening the body may explain, Arakaki surmises, why Seisan rather than Naihanchi was his foundation. He died of malnutrition in the Ishikawa internment camp.",s:"⑥ pp.381-383"},r:["hist-koryu-nahate","seishan-pressure"]},
{id:"motobu",c:"people",ja:{t:"本部朝基",y:"もとぶ ちょうき",d:"（1870-1944）王家系名家の三男。辻の「掛け試し」で無敗を誇り「本部の猿」と呼ばれた実戦の人。修行はナイファンチひとつ。1925年、キング誌の「唐手拳闘大試合」記事で外人ボクサーを一撃で倒した姿が全国に知られた（挿絵は船越の姿で描かれた）。「同じ技は三歩（三度）まで」の実戦則を遺す。最晩年の完璧な形は「よたよたしたおじいさん」にしか見えず、それこそが完成だった。ナイファンチで足を「ソッ」と静かに降ろすオフビートの体現者。近代においてナイファンチ立ちの真定義を理解して行なっていたのは本部だけ、と新垣は極論する。",s:"①p.91, p.105／②p.33-36／④p.85-88／⑥p.389-394"},en:{t:"Motobu Choki",d:"(1870-1944) Third son of a princely house, undefeated in the kake-dameshi street challenges of Tsuji—'Motobu the Monkey', the man of real fights, whose training was Naihanchi alone. In 1925 the magazine King made him famous for felling a Western boxer with one blow (the illustrator drew Funakoshi's face by mistake). He left the combat rule 'the same technique at most three times'. His final, perfect kata looked like nothing but 'a tottering old man'—and that was its completion; he set his foot down in Naihanchi with a soundless 'so'—the off-beat incarnate. In the modern age, Arakaki ventures, only Motobu truly understood and practiced the Naihanchi stance.",s:"① pp.91, 105; ② pp.33-36; ④ pp.85-88; ⑥ pp.389-394"},r:["naihanchi","muhyoshi","kata-master","hist-funakoshi-motobu"]},
{id:"higaonna",c:"people",ja:{t:"東恩納寛量",y:"ひがおんな かんりょう",d:"（1853-1915）新興那覇手を興した人物。家業は山原船で、中国渡海の中継地・慶良間を熟知しており、脱清人たちの渡海と密接な関係があった可能性を新垣は推察する。「ルールー」の愛称は中国での「量量」か。渡航歴には諸説あり、知花朝信の「3年間福州」説が事実に近いか、とされる。義村朝明は「思った以上に上手になって帰ってきた」と評した。",s:"⑥p.339-344"},en:{t:"Higaonna Kanryo",d:"(1853-1915) Founder of the new Naha-te. His family ran yanbaru trading ships and knew Kerama—the way-station to China—intimately; Arakaki surmises a close connection with the datsushin exiles' crossings. His nickname 'Ruru' may be the Chinese 'Liang-liang'. Accounts of his China years vary; Chibana Choshin's 'three years in Fuzhou' may be nearest the truth. Yoshimura Choaki's verdict: 'He came back better than we expected.'",s:"⑥ pp.339-344"},r:["hist-koryu-nahate","miyagi"]},
{id:"miyagi",c:"people",ja:{t:"宮城長順",y:"みやぎ ちょうじゅん",d:"（1888-1953）剛柔流開祖。1915年以降に中国から怒責作用を導入し、サンチンの呼吸法を「息吹」に変えた。撃砕一・二、転掌（さらにサイファも、と新垣は推察）を創作。その記した「文政一一年の交（1828）」は、十干「戊」と十二支「戌」の混同による1838年（戊戌の御冠船）の誤りとみられる。",s:"⑥p.319-321／第24章"},en:{t:"Miyagi Chojun",d:"(1888-1953) Founder of Goju-ryu. After 1915 he introduced forced breathing from China, converting Sanchin's breath into ibuki, and created Gekisai 1 and 2 and Tensho (Saifa too, Arakaki surmises). His written date 'around 1828' appears to confuse the sexagenary signs for 1838—the year of the crown ship at modern karate's source.",s:"⑥ pp.319-321; ch. 24"},r:["hist-doseki","hist-boshu","higaonna"]},
{id:"go-kenki",c:"people",ja:{t:"呉賢貴",y:"ご けんき",d:"（1886-1940）白鶴拳の使い手。1912年に来琉し、ハッファ（白鳥）・八歩連・ニーパイポ・ネーパイの形を移入した。「チンクチ」という言葉は、彼が鶴拳を指導した際の用語「地根力」が元ではないか、と新垣は推察する。",s:"⑥p.370／年表1912"},en:{t:"Go Kenki (Wu Xiangui)",d:"(1886-1940) A White Crane boxer who came to Okinawa in 1912, bringing the kata Happa (White Swan), Happoren, Nipaipo, and Nepai. The very word chinkuchi, Arakaki surmises, may stem from digenli—'ground-root power'—as he taught it.",s:"⑥ p.370; chronology 1912"},r:["chinkuchi-etymology"]},
{id:"kin-ryojin",c:"people",ja:{t:"金武良仁",y:"きん りょうじん",d:"御冠船踊りの名人。弟子にガマクのことを言われ、「ガマクとは何か？」と尋ねた逸話が又吉靜江論文に残る――王朝時代の上流社会に「ガマク」という言葉が無かった可能性の傍証である。",s:"⑥p.369"},en:{t:"Kin Ryojin",d:"A master of the crown-ship court dances. The anecdote of his asking his own students 'what is this gamaku?'—preserved in Matayoshi Shizue's paper—hints that the word did not exist in kingdom-era high society.",s:"⑥ p.369"},r:["gamaku-etymology"]},
{id:"kuniyoshi",c:"people",ja:{t:"国吉真吉",y:"くによし しんきち",d:"（1848-1926）「山原国吉」。崎山喜徳の弟子で、本部朝基の師の一人。膂力に優れた手強拳武士（ティージクンブサー）。中村茂（沖縄拳法）にニーセーシ・セーサン・シソーチンを伝授しており、アソン伝承の形の可能性がある。",s:"⑥p.337-339"},en:{t:"Kuniyoshi Shinkichi",d:"(1848-1926) 'Yanbaru Kuniyoshi', student of Sakiyama Kitoku and one of Motobu Choki's teachers—a fist-fighting bushi of great physical power. He transmitted Niseishi, Seisan, and Sochin to Nakamura Shigeru (Okinawa Kenpo), possibly kata of the Ason line.",s:"⑥ pp.337-339"},r:["motobu"]},
{id:"kojo",c:"people",ja:{t:"湖城家",y:"こぐすくけ",d:"久米村の蔡氏。湖城以正は中国でイワー（清の武官）の師範代を務めた。「久米の手」こそ古流那覇手の実態であり、東恩納寛量は幼少期に湖城以正か、その親族から手ほどきを受けたとみられる。",s:"⑥第21章／p.343"},en:{t:"The Kojo (Kogusuku) Family",d:"The Cai clan of Kume village. Kojo Isei served in China as assistant instructor to the Qing officer Iwah. The 'te of Kume' was the true old Naha-te, and Higaonna Kanryo appears to have had his first instruction from Kojo Isei or his kin.",s:"⑥ ch. 21; p.343"},r:["hist-koryu-nahate","higaonna"]},
{id:"sai-on",c:"people",ja:{t:"蔡温",y:"さい おん",d:"（1682-1761）琉球王国の三司官。その『独物語』は、薩摩体制下でも武術修行が「奉公節義の勤め」として続いていたことの証拠であり、同時に年代を干支の十二支のみで伝えた（誤記の温床となる）習慣の証拠でもある。",s:"⑥第11章／p.350-352"},en:{t:"Sai On",d:"(1682-1761) Sanshikan minister of the kingdom. His Dokumonogatari proves that martial training continued under Satsuma as a duty of loyal service—and also that dates were kept by zodiac sign alone, the seedbed of later chronological errors.",s:"⑥ ch. 11; pp.350-352"},r:["hist-kinbu","hist-boshu"]},
{id:"gima",c:"people",ja:{t:"儀間真謹",y:"ぎま しんきん",d:"（1896-1989）1922年、講道館で船越義珍とともに演武（儀間＝ナイファンチ、船越＝クーシャンクー）。日本本土初の空手公開演武の生き証人である。",s:"⑥p.387"},en:{t:"Gima Shinkin",d:"(1896-1989) Demonstrated at the Kodokan in 1922 beside Funakoshi Gichin—Gima performing Naihanchi, Funakoshi Kusanku: living witness of mainland Japan's first public karate demonstration.",s:"⑥ p.387"},r:["funakoshi"]},
{id:"funakoshi",c:"people",ja:{t:"船越義珍",y:"ふなこし ぎちん",d:"大正11年（1922）講道館での初公開演武により空手を本土へ移入した「教育・普及」の人。大極の形の創始者（沖縄では説明が不要だったため、体操用と誤解されがちなこの形の真価は①で再生される）。「此の心を奮発して、蒼天に誓った」の漢詩を遺す。本部朝基と並ぶ「空手の両輪」。",s:"①p.114, p.137／⑥p.387, p.396"},en:{t:"Funakoshi Gichin",d:"The man of education and diffusion who carried karate to the mainland with the first public demonstration at the Kodokan in 1922. Creator of the Taikyoku kata—needing no explanation in Okinawa and thus mistaken for calisthenics until Vol. ① revives it. He left the verse 'rousing this heart, I swore it to the blue heavens'. With Motobu Choki, one of karate's two wheels.",s:"① pp.114, 137; ⑥ pp.387, 396"},r:["hist-funakoshi-motobu","taikyoku-saisei","gima"]},
{id:"chibana",c:"people",ja:{t:"知花朝信",y:"ちばな ちょうしん",d:"（1885-1969）小林流開祖。本部朝基の最晩年のナイファンチに独り驚喜した――「これこそ……これこそ……」（観の目の逸話）。体育空手と昔手（ムカシンデー）の両方ができた「両刀」であり、だからこそ若くして大著に掲載された、と②は評する。",s:"①p.105／②p.106"},en:{t:"Chibana Choshin",d:"(1885-1969) Founder of Shorin-ryu. He alone rejoiced at the aged Motobu Choki's Naihanchi—'This is it... this is it...' (the kan-no-me anecdote). He commanded both the gymnastic karate and the old te, mukashindi—which, Vol. ② notes, is why he appeared so young in the great compendia.",s:"① p.105; ② p.106"},r:["kan-no-me","motobu"]},
{id:"nagamine",c:"people",ja:{t:"長嶺将真",y:"ながみね しょうしん",d:"（1907-1997）松林流開祖。左足を上げた姿勢の写真を新垣は「涙が出る素晴らしさ」と評し、道場に掲げられた本部朝基の写真には「生きていますね！」と声を掛けた。松林流の拳の位置（乳の脇）は「胸を張るため」＝倒地法の入口だった。前蹴りの写真も見事である。",s:"①p.105, p.109／②p.42-43, p.107"},en:{t:"Nagamine Shoshin",d:"(1907-1997) Founder of Matsubayashi-ryu. His photograph poised on one raised leg Arakaki calls 'beautiful enough to bring tears'; before the portrait of Motobu in Nagamine's dojo he exclaimed, 'He is alive!' The Matsubayashi fist position beside the chest exists 'to expand the chest'—the doorway to the falling-tree method. His front-kick photographs are superb.",s:"① pp.105, 109; ② pp.42-43, 107"},r:["tochiho","motobu"]},
{id:"arakaki-ankichi",c:"people",ja:{t:"新垣安吉",y:"あらかき あんきち",d:"（1899-1927）長嶺将真の師。足の親指と人差し指で蹴る指先蹴り（ゆびさきげり）の名手であり、裸足のつま先で地面を歩いて鍛えたという。",s:"②p.117"},en:{t:"Arakaki Ankichi",d:"(1899-1927) Teacher of Nagamine Shoshin, and a master of the toe-tip kick delivered with the big and index toes—trained, it is said, by walking the ground barefoot on his toes.",s:"② p.117"},r:["nagamine","hamstring"]},
{id:"suya-saburo",c:"people",ja:{t:"宮城嗣吉（スヤー・サブロー）",y:"すやー・さぶろー",d:"本部朝基の直弟子で、掛け試し無敗の伝説を持つ。「直線の回し蹴り」を編み出したが、実業界へ転じたため伝承されなかった。",s:"②p.135-136"},en:{t:"Miyagi 'Suya Saburo'",d:"Direct student of Motobu Choki, undefeated in the kake-dameshi challenges. He devised the 'straight-line roundhouse kick', but turned to business, and the technique was never passed on.",s:"② pp.135-136"},r:["motobu"]},
{id:"uechi",c:"people",ja:{t:"上地完英",y:"うえち かんえい",d:"（1911-1991）上地流二代目。新垣はそのビデオの倒地法の蹴りが完璧であることに驚愕し、「空手をやめようかと本気で考えた」と記す。",s:"②p.107"},en:{t:"Uechi Kanei",d:"(1911-1991) Second-generation head of Uechi-ryu. Watching his falling-tree kick on video, flawless, Arakaki confesses he 'seriously considered quitting karate'.",s:"② p.107"},r:["tochiho"]},
{id:"shiroma",c:"people",ja:{t:"城間眞繁",y:"しろま しんぱん",d:"『空手道大観』では写真用の体育的ポーズを取っている。近代人として写真というメディアの効用を熟知していたのであり、名誉のための注記である、と②は記す。",s:"②p.106"},en:{t:"Shiroma Shinpan",d:"In the Karate-do Taikan he strikes gymnastic poses for the camera—a modern man who understood exactly what photography was for. Vol. ② records this in defense of his honor.",s:"② p.106"},r:["hanashiro"]},
{id:"oshiro",c:"people",ja:{t:"大城利弘",y:"おおしろ としひろ",d:"（1949-）山根流棒術師範。「真の演武線＝自分と仮想の相手の正中線の一致」という卓越した意見の主であり、武術の概念が消滅しつつある現代沖縄に、形を演じ得る人物が現存する――その驚きを④は記している。",s:"④p.122"},en:{t:"Oshiro Toshihiro",d:"(b. 1949) Master of Yamane-ryu bojutsu, author of the remarkable insight that the true embusen is the coincidence of one's own and the virtual opponent's centerlines. That a man who can truly perform kata still exists in an Okinawa where the martial concepts are dying—Vol. ④ records the astonishment.",s:"④ p.122"},r:["true-embusen"]},
/* ---- People (2/2): Japanese budo & thinkers ---- */
{id:"ueshiba",c:"people",ja:{t:"植芝盛平",y:"うえしば もりへい",d:"（1883-1969）合気道開祖。「歩くからこそ技が出る」を体現し、爪先は45度。第三者の目（岡目八目）を持ち、究極の合気とは宇宙自体になることだった。③では「戦いの場におけるエネルギーの総和」に気づいた一人と評され、「合気」＝無の場を気の総和で満たすこと＝絶対不敗の道、と新垣は愚考する。近代最後の武道の人。",s:"①p.70, p.80, p.104, p.153／③p.149"},en:{t:"Ueshiba Morihei",d:"(1883-1969) Founder of aikido. He embodied 'technique is born because one walks', toes at 45 degrees, and possessed the bystander's eye; his ultimate aiki was to become the universe itself. Vol. ③ counts him among the few who noticed the total energy of the battlefield—aiki as filling the field of nothingness with the sum of ki, the road of absolute invincibility, in Arakaki's humble reading. The last man of budo in the modern age.",s:"① pp.70, 80, 104, 153; ③ p.149"},r:["okame-hachimoku","box-creation","walking"]},
{id:"oyama",c:"people",ja:{t:"大山倍達",y:"おおやま ますたつ",d:"（1923-1994）極真会館創始者。額を軽く押さえられただけで立ち上がれなくなる逸話が、「仮想の重心を外に作れなければ人は立てない」ことの実証として①に引かれる。",s:"①p.80"},en:{t:"Mas Oyama (Oyama Masutatsu)",d:"(1923-1994) Founder of Kyokushin. The anecdote of being unable to rise with a mere fingertip on the forehead appears in Vol. ① as proof that without a virtual center placed outside the body, a human cannot even stand.",s:"① p.80"},r:["virtual-center"]},
{id:"bokuden",c:"people",ja:{t:"塚原卜伝",y:"つかはら ぼくでん",d:"（1489-1571）剣聖。「ひとつの太刀」は、コンビネーションを否定する「ひとつの拳」の源であり、一つの思想の原型である。",s:"①p.129"},en:{t:"Tsukahara Bokuden",d:"(1489-1571) The sword saint. His hitotsu-no-tachi, the Single Sword, is the source of 'one fist is enough'—the archetype of the philosophy of one.",s:"① p.129"},r:["kobo-icchi","one-thought"]},
{id:"iizasa",c:"people",ja:{t:"飯篠長威斎",y:"いいざさ ちょういさい",d:"（1387?-1488）天真正伝香取神道流開祖。熊笹の上に座って葉を折らなかった逸話は「浮く」の体現であり、「兵法は平法である」の言葉を遺した。",s:"①p.113"},en:{t:"Iizasa Choisai",d:"(c.1387-1488) Founder of Tenshin Shoden Katori Shinto-ryu. Sitting on bamboo grass without bending a leaf—floating incarnate—he left the words 'the art of war is the art of peace'.",s:"① p.113"},r:["uku","heiho"]},
{id:"kamiizumi",c:"people",ja:{t:"上泉伊勢守秀綱と柳生新陰流",y:"かみいずみ いせのかみ",d:"上泉伊勢守（1508-1577）は新陰流開祖。「三学円之太刀」は禅書・碧巌録から「一刀両段」「斬釘截鉄」等を借用しており、武道言語化の苦闘の系譜を示す。その流れを汲む柳生新陰流は、合撃（切落とし）を最初に徹底的に学ばせてから十文字勝ちへ進む――ナイファンチを最初に学ぶことと同じ構造である。正中線を「人中路（ジンチュウロ）」と呼んだ。",s:"④p.106-108, p.119-120, p.181"},en:{t:"Kamiizumi Ise-no-kami & Yagyu Shinkage-ryu",d:"Kamiizumi (1508-1577) founded Shinkage-ryu; his 'Sangaku-en-no-tachi' borrows from the Zen classic Blue Cliff Record—a lineage of the struggle to put budo into words. The Yagyu line that followed teaches gasshi (kiriotoshi) first and exhaustively before the cross-victory—the same architecture as learning Naihanchi first. Their name for the centerline: jinchuro, 'the road through the man's center'.",s:"④ pp.106-108, 119-120, 181"},r:["gasshi","naihanchi-hogejaku"]},
{id:"chiba-shusaku",c:"people",ja:{t:"千葉周作",y:"ちば しゅうさく",d:"（1793-1856）北辰一刀流・玄武館。『剣法秘訣』に奥義「闇夜に霜を聞く」を記した。「曰く、言い難い」思いを言い表した白眉として、④の言語化苦闘の文脈でも再登場する。",s:"③p.130-132／④p.181"},en:{t:"Chiba Shusaku",d:"(1793-1856) Founder of Hokushin Itto-ryu. His Kenpo Hiketsu records the inner secret 'hearing the frost on a dark night'—cited again in Vol. ④ as the finest expression ever wrung from the ineffable.",s:"③ pp.130-132; ④ p.181"},r:["yamiyo"]},
{id:"odani",c:"people",ja:{t:"男谷精一郎信友",y:"おだに せいいちろう",d:"（1798-1864）直心影流・幕府講武所頭取。辞世「うけゑたる心のかかみ影きよく、けふ大空にかへすうれしさ」――修行とは授かった心のかかみを磨く作業であり、死とはそのかかみを大空に返すことである。",s:"③p.158-159（あとがき）"},en:{t:"Odani Seiichiro Nobutomo",d:"(1798-1864) Of Jikishinkage-ryu, head of the shogunate's military academy. His death poem: 'The mirror of heart I once received, its reflection clear—what joy, today, to return it to the great sky.' Training is the polishing of a lent mirror; death, its return.",s:"③ pp.158-159 (afterword)"},r:["shitataka"]},
{id:"sakakibara",c:"people",ja:{t:"榊原鍵吉",y:"さかきばら けんきち",d:"（1830-1894）直心影流。70キロの木刀の素振り（真空地帯）で知られ、受けた弟子は失神したという。",s:"②p.62-63"},en:{t:"Sakakibara Kenkichi",d:"(1830-1894) Of Jikishinkage-ryu, famed for swinging a 70-kilogram wooden sword—the 'vacuum zone'. The student who once received it fainted outright.",s:"② pp.62-63"},r:["latissimus"]},
{id:"harigaya",c:"people",ja:{t:"針ヶ谷夕雲",y:"はりがや せきうん",d:"（1593?-1662）無住心剣術。奥義「相抜け」――双方が斬らずに抜け合う境地。沖縄空手ではこれが技術として「蹴り抜け」まで可能である、と②は記す。",s:"②p.147"},en:{t:"Harigaya Sekiun",d:"(c.1593-1662) Of Mujushin swordsmanship, whose secret ainuke has both swordsmen pass through without cutting. In Okinawan karate, Vol. ② notes, the same is possible as concrete technique—even as the 'kick-through'.",s:"② p.147"},r:["zettai-fusen"]},
{id:"takuan",c:"people",ja:{t:"沢庵宗彭",y:"たくあん そうほう",d:"（1573-1646）臨済宗の禅僧。「心こそ、心惑わす心なり。心に心、心ゆるすな」――新垣はこれをスポーツ心理学の頂点と評する。",s:"①p.158"},en:{t:"Takuan Soho",d:"(1573-1646) Rinzai Zen master. 'It is the mind that bewilders the mind; mind, never let the mind loose upon the mind'—for Arakaki, the summit of sports psychology, written three centuries early.",s:"① p.158"},r:["shinpo"]},
{id:"omori-sogen",c:"people",ja:{t:"大森曹玄",y:"おおもり そうげん",d:"（1905-1994）『剣と禅』の著者。歌「いまといふ、いまなる時は、なかりけり、まの時くれば、いの時は去る」は刹那の定義そのものであり、武術の刹那は「い・ま」の「い」、「ド・ン」の「ド」である。",s:"④p.133"},en:{t:"Omori Sogen",d:"(1905-1994) Author of Ken to Zen (Sword and Zen). His poem—by the time the 'ma' of ima, 'now', arrives, the 'i' has already gone—is the very definition of the setsuna: the martial instant is the 'i' of ima, the 'D' of DON.",s:"④ p.133"},r:["setsuna"]},
{id:"togo",c:"people",ja:{t:"東郷平八郎",y:"とうごう へいはちろう",d:"（1848-1934）日本海海戦のT字戦法は、自分の最強部を相手の最弱部に集中する二等辺三角形の理念の、艦隊規模での体現である。",s:"②p.78-80"},en:{t:"Togo Heihachiro",d:"(1848-1934) His crossing of the T at Tsushima is the isosceles-triangle principle—your strongest part concentrated on the enemy's weakest—realized at the scale of fleets.",s:"② pp.78-80"},r:["isosceles"]},
{id:"nishida",c:"people",ja:{t:"西田幾多郎",y:"にしだ きたろう",d:"（1870-1945）京都大学教授。東洋の思想を西洋哲学で説明しようと苦闘し、「絶対矛盾的自己同一」をあみだした――「真理は直列と並列の間に横たわる」と同じ境地である、と新垣は位置づける。",s:"④p.179"},en:{t:"Nishida Kitaro",d:"(1870-1945) Kyoto philosopher who wrestled Eastern thought into Western language and forged 'absolutely contradictory self-identity'—the same ground, Arakaki holds, as 'truth lies between series and parallel'.",s:"④ p.179"},r:["series-parallel-truth"]},
/* ---- Sayings ---- */
{id:"q-gyakuzuki",c:"quote",q:true,w:{ja:"沖縄の古老",en:"An old master of Okinawa"},ja:{t:"沖縄空手には、逆突きはない！",d:"①巻末に列挙された「離反する言葉」の筆頭。膝の抜きで出す突きに順逆の区別はない――④の解剖学で全面回収された。",s:"①p.169"},en:{t:"In Okinawan karate, there is no reverse punch!",d:"First of the 'contrary sayings' listed at the end of Vol. ①: a punch launched by knee release knows no lead or reverse—fully resolved by the anatomy of Vol. ④.",s:"① p.169"},r:["no-gyakuzuki"]},
{id:"q-jikuashi",c:"quote",q:true,w:{ja:"沖縄の古老",en:"An old master of Okinawa"},ja:{t:"蹴りの時の軸足は、軸ではない！",d:"軸足を軸にして回れば居着く。②第五章が全面回収した言葉。",s:"①p.169／②p.116"},en:{t:"In a kick, the pivot leg is no pivot!",d:"Spin on a pivot and you root yourself. Fully reclaimed in Vol. ②, chapter five.",s:"① p.169; ② p.116"},r:["hamstring","tochiho"]},
{id:"q-ashidetatsuna",c:"quote",q:true,w:{ja:"沖縄の古老",en:"An old master of Okinawa"},ja:{t:"足で立つな！",d:"足に体重を乗せた瞬間に居着く。「浮く」ことへの警句。",s:"①p.169"},en:{t:"Do not stand on your feet!",d:"The instant weight settles onto the feet, you root. An admonition toward floating.",s:"① p.169"},r:["uku"]},
{id:"q-aruke",c:"quote",q:true,w:{ja:"沖縄の古老",en:"An old master of Okinawa"},ja:{t:"武道は走ってはならない、歩け！",d:"走りは畜生道。頭が上下せず初動の見えない「歩き」こそ武道の移動である。",s:"①p.169"},en:{t:"Budo must not run—walk!",d:"Running is the way of beasts; the walk, headline level and start invisible, is budo's locomotion.",s:"① p.169"},r:["walking"]},
{id:"q-ukunoda",c:"quote",q:true,w:{ja:"沖縄の古老",en:"An old master of Okinawa"},ja:{t:"飛ぶな、浮くのだ！",d:"跳躍は落下点が読まれる。浮けば、どこへでも落ちられる。",s:"①p.169"},en:{t:"Do not jump—float!",d:"A jump betrays its landing point; float, and you may fall anywhere you choose.",s:"① p.169"},r:["uku","ochiru-uku"]},
{id:"q-katameruna",c:"quote",q:true,w:{ja:"沖縄の古老",en:"An old master of Okinawa"},ja:{t:"身体を固めるな、固めると居着く",d:"固める＝剛体化は悪癖の居着き。ただし脱力とも違う――正解は「張る」である。首里手の口伝その八でもある。",s:"①p.169／⑤p.195"},en:{t:"Do not stiffen the body—stiffen and you root",d:"Rigidity is rootedness made habit. Yet the answer is not going limp either—it is tautness. Also oral teaching No. 8 of Shuri-te.",s:"① p.169; ⑤ p.195"},r:["kuden-15","itsuki"]},
{id:"q-kobushi",c:"quote",q:true,w:{ja:"沖縄の古老",en:"An old master of Okinawa"},ja:{t:"拳は握るな、振るのだ！",d:"握り込みは前腕を固めて鞭を殺す。拳は「指を折り畳む」だけで良い。",s:"①p.169"},en:{t:"Do not clench the fist—swing it!",d:"Clenching hardens the forearm and kills the whip; the fist need only fold its fingers.",s:"① p.169"},r:["whip-body","spiral-arm"]},
{id:"q-hayasa",c:"quote",q:true,w:{ja:"沖縄の古老",en:"An old master of Okinawa"},ja:{t:"技とは、速いから見えないのではない、速さが見えないのだ",d:"時間の捻出と無拍子の核心。見えないのは速度ではなく「起こり」である。",s:"①p.169"},en:{t:"A technique is not invisible because it is fast—its speed is invisible",d:"The heart of created time and no-rhythm: what cannot be seen is not the velocity but the start.",s:"① p.169"},r:["time-creation","muhyoshi"]},
{id:"q-naihanchi",c:"quote",q:true,w:{ja:"沖縄の古老",en:"An old master of Okinawa"},ja:{t:"ナイファンチを知らなければ、すべての形は無意味だ",d:"ナイファンチは思想の中核をなす基本形。エネルギー創出を知らずに応用形へ進めば形踊りになる。",s:"①p.169"},en:{t:"Without knowing Naihanchi, every kata is meaningless",d:"Naihanchi is the core kata of the philosophy: advance to the application kata without its energy creation and you are dancing.",s:"① p.169"},r:["naihanchi","oyo-kata"]},
{id:"q-bunkai",c:"quote",q:true,w:{ja:"沖縄の古老",en:"An old master of Okinawa"},ja:{t:"形の分解は無意味だ",d:"手刀・正拳への技の総括を理解しない分解は99％のこじつけになる。形は変化（応用）で学ぶ。",s:"①p.169"},en:{t:"Bunkai is meaningless",d:"Analysis that ignores how techniques were consolidated becomes 99% forced interpretation; kata is learned through henka, living variation.",s:"① p.169"},r:["kata-shometsu","kata-tsukaenai"]},
{id:"q-kataerukana",c:"quote",q:true,w:{ja:"沖縄の古老",en:"An old master of Okinawa"},ja:{t:"形を変えるな。しかし、形を変えることの出来ない空手家は無能だ",d:"守破離の全行程を一文に圧縮した言葉。",s:"①p.169"},en:{t:"Do not change the kata. Yet the karateka who cannot change the kata is worthless",d:"The whole of shu-ha-ri compressed into a single sentence.",s:"① p.169"},r:["muso","sayu-taisho"]},
{id:"q-tsukandara",c:"quote",q:true,w:{ja:"沖縄の古老",en:"An old master of Okinawa"},ja:{t:"つかんだら蹴れ、つかまれたら蹴れ",d:"手が使えない距離こそ蹴りの距離。首里手の口伝その十五でもある。",s:"②p.104／⑤p.211"},en:{t:"If you grab, kick; if you are grabbed, kick",d:"The distance where hands fail is the kicking distance. Also oral teaching No. 15.",s:"② p.104; ⑤ p.211"},r:["kuden-15"]},
{id:"q-sumo",c:"quote",q:true,w:{ja:"沖縄の古老",en:"An old master of Okinawa"},ja:{t:"空手を使う者とは、角力（スモウ）を取るな",d:"空手家は組んでも蹴る。組み技の間合いに空手の蹴りが同居している警告である。",s:"②p.104, p.133"},en:{t:"Never wrestle a man who uses karate",d:"The karateka kicks even in the clinch—a warning that the grappling range still contains the kick.",s:"② pp.104, 133"},r:["hyoshi-zero"]},
{id:"q-muchimi",c:"quote",q:true,w:{ja:"沖縄の古老",en:"An old master of Okinawa"},ja:{t:"ムチミの無い空手は、沖縄の空手ではない",d:"「ムチミの付け方で、空手家の実力が分かる」とも言われた。",s:"②p.119"},en:{t:"Karate without muchimi is not Okinawan karate",d:"It was also said: 'You can read a karateka's skill by how he applies muchimi.'",s:"② p.119"},r:["muchimi"]},
{id:"q-bushi",c:"quote",q:true,w:{ja:"沖縄の古老",en:"An old master of Okinawa"},ja:{t:"武士（ブシ）が、そんなにいてたまるか！",d:"真髄を解る者は全体の4％、教えられる者は各世代に一人いれば上出来――二十―八十の法則の実感である。",s:"②p.97"},en:{t:"You think bushi grow on trees?!",d:"Four in a hundred grasp the essence; one teacher per generation is a fine harvest—the 20–80 rule felt from inside.",s:"② p.97"},r:["twenty-eighty"]},
{id:"q-wakatteiru",c:"quote",q:true,w:{ja:"沖縄の古老",en:"An old master of Okinawa"},ja:{t:"あの男は、解っている！",d:"免状のない世界における、唯一の認定であった。",s:"②p.97"},en:{t:"That man—he understands!",d:"In a world without certificates, the only certification there was.",s:"② p.97"},r:["ko-no-shiso"]},
{id:"q-kokomade",c:"quote",q:true,w:{ja:"沖縄の先達",en:"An Okinawan elder"},ja:{t:"アラカキ、ここまでは書くな！",d:"それでも書く――日本人が解明しなければ、他者が先に解明してしまうから。解明の使命の原点。",s:"②p.154"},en:{t:"Arakaki, do not write this far!",d:"And he wrote anyway—for if the Japanese do not decode the art, others will decode it first. The origin of the mission to decode.",s:"② p.154"},r:["kaimei-shimei"]},
{id:"q-hashirinagara",c:"quote",q:true,w:{ja:"新垣清",en:"Kiyoshi Arakaki"},ja:{t:"空手家なら、歩きながら蹴れるのは当然だ。全速で走りながら、タックルしながらでも蹴れるようにしろ！",d:"蹴りは止まって出すものではない。拍子ゼロの世界への要求水準。",s:"②p.131"},en:{t:"A karateka kicks while walking as a matter of course. Learn to kick at a full sprint—while tackling!",d:"The kick is never delivered from a standstill: the standard demanded by the world of zero rhythm.",s:"② p.131"},r:["hyoshi-zero"]},
{id:"q-yamiyo",c:"quote",q:true,w:{ja:"千葉周作『剣法秘訣』",en:"Chiba Shusaku, Kenpo Hiketsu"},ja:{t:"闇夜に霜を聞く",d:"無音・等速の達人に対抗する唯一の心法。武道が心身文化へ昇華した瞬間の言葉。",s:"③p.130"},en:{t:"Hear the frost fall on a dark night",d:"The one method of mind against a master who moves without sound or acceleration—the words of the moment budo became a culture of mind and body.",s:"③ p.130"},r:["yamiyo","chiba-shusaku"]},
{id:"q-katteutsu",c:"quote",q:true,w:{ja:"箱の思想",en:"The philosophy of the box"},ja:{t:"勝って打つ！",d:"打って勝つのではない。箱の飽和点を制した時点で勝敗は決しており、打撃はその確認にすぎない。",s:"③p.144-147"},en:{t:"Win—then strike!",d:"Not strike to win: the fight is decided when the box's saturation point is commanded; the blow merely confirms it.",s:"③ pp.144-147"},r:["box-creation"]},
{id:"q-munedearuke",c:"quote",q:true,w:{ja:"沖縄の古老",en:"An old master of Okinawa"},ja:{t:"達人は、胸で歩く",d:"前方ガマク＝箱の頂点である胸から倒れ込む歩き。タメに見えるものはソリである。",s:"③p.126-130"},en:{t:"The master walks with his chest",d:"Forward gamaku: falling from the chest, apex of the box. What looks like a coil is the arch.",s:"③ pp.126-130"},r:["hakoBody","sori"]},
{id:"q-shirukoto",c:"quote",q:true,w:{ja:"東洋思想",en:"Eastern thought"},ja:{t:"知ることは、成ることである",d:"知識は身体で具現化されて初めて「知った」ことになる。絶対無の境地の入口。",s:"③p.154"},en:{t:"To know is to become",d:"Knowledge is 'known' only when embodied. The threshold of absolute mu.",s:"③ p.154"},r:["shiru-naru","zettai-mu"]},
{id:"q-muwoomou",c:"quote",q:true,w:{ja:"新垣清",en:"Kiyoshi Arakaki"},ja:{t:"無を想うが故に、有を為す",d:"有であるが故に限りある人間が、無となることで無限の大きさを手にし、実社会で成すべき事を為せる。",s:"③p.155"},en:{t:"Because we contemplate nothingness, we accomplish being",d:"Finite because we exist, we gain the infinite by becoming mu—and thereby do what must be done in the actual world.",s:"③ p.155"},r:["zettai-mu","muso"]},
{id:"q-inochiwokezutte",c:"quote",q:true,w:{ja:"新垣清（要旨）",en:"Kiyoshi Arakaki (paraphrase)"},ja:{t:"命を削って書いたのではない。命を削って、書かせてもらった",d:"③あとがきの言葉。解明の使命を負う者の実感である。",s:"③p.158"},en:{t:"I did not carve my life away to write this—I was permitted to write it, carving my life away",d:"From the afterword of Vol. ③: the feeling of one who carries the mission to decode.",s:"③ p.158"},r:["kaimei-shimei"]},
{id:"q-teuchi",c:"quote",q:true,w:{ja:"新垣清",en:"Kiyoshi Arakaki"},ja:{t:"手と腕は手打ち。しかし突きは手打ちではない",d:"腕は道具にすぎず、突きのエネルギーはクシで作る。④第一章の宣言。",s:"④p.17-20"},en:{t:"The hand and arm merely hand-strike—yet the punch is no arm-punch",d:"The arm is only a tool; the punch's energy is made in the kushi. The opening declaration of Vol. ④.",s:"④ pp.17-20"},r:["teuchi","kushi"]},
{id:"q-kushi",c:"quote",q:true,w:{ja:"首里手の口伝",en:"Shuri-te oral teaching"},ja:{t:"力はクシから",d:"口伝その三。③④の解剖学（腰の三筋・広背筋）と完全に符合する、体系の要の言葉。",s:"⑤p.189／④p.35"},en:{t:"Power comes from the kushi",d:"Oral teaching No. 3—in perfect accord with the anatomy of Vols. ③ and ④: the keystone sentence of the system.",s:"⑤ p.189; ④ p.35"},r:["kushi","kuden-15"]},
{id:"q-arukukotogawaza",c:"quote",q:true,w:{ja:"新垣清",en:"Kiyoshi Arakaki"},ja:{t:"歩くことが技",d:"上下の操作は前後の間合いを詰めるために存在する。移動と攻撃は別のものではない。",s:"④p.117"},en:{t:"Walking is the technique",d:"Vertical operations exist to close the fore-aft distance; locomotion and attack were never separate things.",s:"④ p.117"},r:["walking","centerline-match"]},
{id:"q-mugendai",c:"quote",q:true,w:{ja:"新垣清",en:"Kiyoshi Arakaki"},ja:{t:"無限大になるから、ゼロになる",d:"動員する筋肉群を無限に増やせば、個々の動作はゼロに近づく。相互否定の究極。",s:"④p.138"},en:{t:"Approaching infinity, it approaches zero",d:"Mobilize infinite muscle groups and each motion approaches zero—the ultimate of mutual negation.",s:"④ p.138"},r:["mugendai-zero"]},
{id:"q-chokudo",c:"quote",q:true,w:{ja:"新垣清（要旨）",en:"Kiyoshi Arakaki (paraphrase)"},ja:{t:"連動ではない、直動だ",d:"連ねて動けば刹那に間に合わない。直感と対をなす出力の原理。",s:"④p.152"},en:{t:"Not chained action—direct action",d:"Move in sequence and you miss the setsuna. The output principle paired with intuition.",s:"④ p.152"},r:["chokudo"]},
{id:"q-seichusen",c:"quote",q:true,w:{ja:"新垣清",en:"Kiyoshi Arakaki"},ja:{t:"正中線は、無いけど、有る",d:"解剖しても見つからない。しかし体系のすべてがその上に建つ――概念であり思想である線。",s:"④p.121"},en:{t:"The centerline does not exist—and yet it does",d:"Dissection will never find it, yet the whole system stands upon it: a line that is concept and philosophy.",s:"④ p.121"},r:["centerline-zero"]},
{id:"q-katatsukaenai",c:"quote",q:true,w:{ja:"新垣清（要旨）",en:"Kiyoshi Arakaki (paraphrase)"},ja:{t:"形が使えないのではない、修行者が形を使えないだけ",d:"「使えない形」は存在しない。真の演武線を知らない修行者がいるだけである。",s:"④p.123"},en:{t:"It is not that the kata cannot be used—it is the practitioner who cannot use it",d:"There is no such thing as an unusable kata—only practitioners who do not know the true embusen.",s:"④ p.123"},r:["kata-tsukaenai"]},
{id:"q-michi",c:"quote",q:true,w:{ja:"新垣清",en:"Kiyoshi Arakaki"},ja:{t:"道とは、目的地に到着することに意味があるのではない。往くことにこそ、道の意味がある",d:"④あとがきの結語。「ゆっくりと、あせらずに進んでいけば良いだけなのだ」。",s:"④p.189"},en:{t:"The meaning of the Way is not in arriving—the meaning of the Way is in the going",d:"The closing words of Vol. ④: 'One need only go on—slowly, without haste.'",s:"④ p.189"},r:["shitataka","michi-doyu"]},
{id:"q-shinsoku",c:"quote",q:true,w:{ja:"松村宗昆",en:"Matsumura Sokon"},ja:{t:"武士は神速を尊ぶ",d:"示現流の達人にして首里手の事実上の創始者の身上。速さこそが実である。",s:"⑤p.46-58"},en:{t:"The bushi prizes divine speed",d:"The creed of the Jigen-ryu master who effectively founded Shuri-te. Speed is the real.",s:"⑤ pp.46-58"},r:["matsumura","hayasa"]},
{id:"q-kusanku",c:"quote",q:true,w:{ja:"屋部憲通",en:"Yabu Kentsu"},ja:{t:"平安をやるくらいなら、古伝クーシャンクーをやれ",d:"学校用に簡素化された形より原型を、という首里の手最後の伝承者の言葉。屋部自身の修行はナイファンチのみだった。",s:"⑤p.23-32"},en:{t:"Rather than the Pinan, do the old Kusanku",d:"The original over the school simplification—words of Shuri-te's last inheritor, whose own training was Naihanchi alone.",s:"⑤ pp.23-32"},r:["yabu","pinan-themes"]},

/* ================= Rendering ================= */
let LANG = "ja";
const byId = {};
DATA.forEach(e => byId[e.id] = e);

function el(tag, cls, html){const n=document.createElement(tag);if(cls)n.className=cls;if(html!=null)n.innerHTML=html;return n;}

function renderAll(){
  const main = document.getElementById("main");
  main.innerHTML = "";
  const ui = UI[LANG];
  CATS.forEach(cat=>{
    const entries = DATA.filter(e=>e.c===cat.id);
    if(!entries.length) return;
    const sec = el("section","catsec"); sec.id="cat-"+cat.id;
    const w = el("div","wrap");
    w.appendChild(el("h2",null, LANG==="ja"?cat.ja:cat.en));
    w.appendChild(el("p","catdesc", LANG==="ja"?cat.jd:cat.ed));
    entries.forEach(e=>{
      const L = e[LANG] || e.ja;
      const X = LANG==="ja" ? (e.en&&e.en.t) : e.ja.t;
      const art = el("article","ent"+(e.q?" qt":"")); art.id = e.id;
      const head = el("div","ent-head");
      head.appendChild(el("h3",null,L.t));
      if(LANG==="ja" && e.ja.y) head.appendChild(el("span","yomi",e.ja.y));
      if(e.w) head.appendChild(el("span","who","― "+(LANG==="ja"?e.w.ja:e.w.en)));
      if(X && !e.q) head.appendChild(el("span","xterm",X));
      art.appendChild(head);
      if(L.d) art.appendChild(el("p","def",L.d));
      if(L.m) art.appendChild(el("p","metaline","<b>"+ui.metalabel+"</b>　"+L.m));
      if(L.s) art.appendChild(el("p","src",ui.srclabel+": "+L.s));
      if(e.r && e.r.length){
        const rel = el("p","rel","<b>"+ui.rellabel+"</b>　");
        e.r.forEach(rid=>{
          const t = byId[rid]; if(!t) return;
          const a = el("a",null, LANG==="ja"?t.ja.t:(t.en?t.en.t:t.ja.t));
          a.href = "#"+rid;
          a.onclick = ev=>{ev.preventDefault(); jumpTo(rid);};
          rel.appendChild(a);
        });
        art.appendChild(rel);
      }
      /* search corpus */
      const other = LANG==="ja" ? (e.en||{}) : e.ja;
      art.dataset.corpus = ((L.t||"")+" "+(e.ja.y||"")+" "+(L.d||"")+" "+(other.t||"")).toLowerCase();
      w.appendChild(art);
    });
    sec.appendChild(w);
    main.appendChild(sec);
  });
  applyFilter();
}

function jumpTo(id){
  const cur = document.querySelector(".chip.on");
  if(state.cat!=="all"){ state.cat="all"; syncChips(); applyFilter(); }
  const t = document.getElementById(id);
  if(!t) return;
  t.scrollIntoView({behavior:"smooth",block:"center"});
  document.querySelectorAll(".ent.hl").forEach(n=>n.classList.remove("hl"));
  t.classList.add("hl");
  setTimeout(()=>t.classList.remove("hl"), 2600);
  history.replaceState(null,"","#"+id);
}

/* ================= Filter state ================= */
const state = {cat:"all", q:""};

function buildChips(){
  const ui = UI[LANG];
  const box = document.getElementById("chips");
  box.innerHTML = "";
  const mk = (id,label,count)=>{
    const b = el("button","chip"+(state.cat===id?" on":""), label+(count!=null?' <span class="n">'+count+"</span>":""));
    b.dataset.cat = id;
    b.onclick = ()=>{state.cat = id; syncChips(); applyFilter();
      if(id!=="all"){const s=document.getElementById("cat-"+id); if(s) s.scrollIntoView({behavior:"smooth"});}
    };
    box.appendChild(b);
  };
  mk("all", ui.all, DATA.length);
  CATS.forEach(c=>{
    const n = DATA.filter(e=>e.c===c.id).length;
    if(n) mk(c.id, LANG==="ja"?c.ja.replace(/　/g," "):c.en, n);
  });
}
function syncChips(){
  document.querySelectorAll(".chip").forEach(b=>b.classList.toggle("on", b.dataset.cat===state.cat));
}

function applyFilter(){
  const q = state.q.trim().toLowerCase();
  let shown = 0;
  document.querySelectorAll(".catsec").forEach(sec=>{
    const catId = sec.id.replace("cat-","");
    let secShown = 0;
    sec.querySelectorAll(".ent").forEach(a=>{
      const okCat = state.cat==="all" || state.cat===catId;
      const okQ = !q || a.dataset.corpus.indexOf(q)>=0;
      const ok = okCat && okQ;
      a.style.display = ok?"":"none";
      if(ok) secShown++;
    });
    sec.style.display = secShown?"":"none";
    shown += secShown;
  });
  document.getElementById("hitcount").textContent = shown + " " + UI[LANG].hits;
  document.getElementById("noresult").style.display = shown?"none":"block";
}

/* ================= Language ================= */
function setLang(lang){
  LANG = lang;
  try{localStorage.setItem("jiten-lang",lang);}catch(e){}
  document.documentElement.lang = lang;
  document.documentElement.dataset.lang = lang;
  document.getElementById("btn-ja").classList.toggle("on",lang==="ja");
  document.getElementById("btn-en").classList.toggle("on",lang==="en");
  const ui = UI[lang];
  document.querySelectorAll("[data-ui]").forEach(n=>{
    const k = n.dataset.ui;
    if(ui[k]!=null) n.innerHTML = ui[k];
  });
  document.getElementById("q").placeholder = ui.searchph;
  document.getElementById("noresult").textContent = ui.noresult;
  document.title = lang==="ja" ? "沖縄空手大辞典｜沖縄空手道無想会 沖縄同好会"
                               : "The Encyclopedia of Okinawan Karate | Muso-kai Okinawa";
  /* pyramid labels */
  const pyrTexts = {
    l5:{ja:"<b>第5層</b>思想 ― 無想・絶対不戦・道友", en:"<b>LAYER 5</b>Philosophy — mu, non-fighting, fellowship"},
    l4:{ja:"<b>第4層</b>認知・心法 ― 観の目・刹那・二十五感", en:"<b>LAYER 4</b>Perception & Mind — kan-no-me, setsuna"},
    l3:{ja:"<b>第3層</b>戦術原理 ― 仮想の重心・正中線・居着き", en:"<b>LAYER 3</b>Tactics — virtual center, centerline"},
    l2:{ja:"<b>第2層</b>身体操作 ― 膝の抜き・ガマク・チンクチ", en:"<b>LAYER 2</b>Body Mechanics — knee release, gamaku"},
    l1:{ja:"<b>第1層</b>物理原理 ― 重力・時間・F=MA", en:"<b>LAYER 1</b>Physics — gravity, time, F=MA"}
  };
  document.querySelectorAll(".pyr-row").forEach(r=>{
    r.innerHTML = pyrTexts[r.dataset.cat][lang];
    r.onclick = ()=>{state.cat = r.dataset.cat; buildChips(); applyFilter();
      const s=document.getElementById("cat-"+r.dataset.cat); if(s) s.scrollIntoView({behavior:"smooth"});};
  });
  buildChips();
  renderAll();
}

/* ================= Init ================= */
document.getElementById("q").addEventListener("input", function(){state.q=this.value; applyFilter();});
window.addEventListener("scroll", ()=>{document.getElementById("totop").style.display = window.scrollY>800 ? "block":"none";});

(function(){
  let lang = "ja";
  try{
    const p = new URLSearchParams(location.search).get("lang");
    lang = p || localStorage.getItem("jiten-lang") || ((navigator.language||"").startsWith("ja")?"ja":"en");
  }catch(e){}
  if(lang!=="en") lang = "ja";
  else lang = "en";
  setLang(lang);
  if(location.hash){
    const id = location.hash.slice(1);
    setTimeout(()=>{ if(byId[id]) jumpTo(id); }, 300);
  }
})();
</script>
